version: '3.8'

services:
  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_DATABASE: ${DB_NAME:-blog_db}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root_password}
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql

  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DB_HOST=db
      - DB_USER=root
      - DB_PASSWORD=${DB_PASSWORD:-root_password}
      - DB_NAME=${DB_NAME:-blog_db}
      - JWT_SECRET=${JWT_SECRET:-your-secret-key}
    depends_on:
      - db

volumes:
  db_data:
