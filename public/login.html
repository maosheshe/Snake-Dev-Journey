<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 蛇蛇的开发之旅</title>
    <link rel="stylesheet" href="/css/main.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .auth-card {
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-glass);
            border-radius: var(--radius-lg);
            width: 100%;
            max-width: 400px;
            padding: 40px;
            box-shadow: var(--shadow-main);
        }

        .auth-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .auth-header h2 {
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 8px;
        }

        .auth-header p {
            color: var(--text-muted);
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-dim);
            width: 18px;
            height: 18px;
        }

        .input-wrapper input {
            padding-left: 40px;
        }

        .error-message {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
            padding: 12px;
            border-radius: var(--radius-sm);
            margin-bottom: 24px;
            font-size: 0.9rem;
            display: none;
            border: 1px solid rgba(239, 68, 68, 0.2);
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card fade-in">
            <div class="auth-header">
                <h2>欢迎回来</h2>
                <p>登录以管理你的文章和设置</p>
            </div>

            <div id="loginError" class="error-message"></div>

            <div class="form-group">
                <label>用户名</label>
                <div class="input-wrapper">
                    <i data-lucide="user"></i>
                    <input type="text" id="loginUsername" class="search-input" placeholder="输入用户名">
                </div>
            </div>

            <div class="form-group">
                <label>密码</label>
                <div class="input-wrapper">
                    <i data-lucide="lock"></i>
                    <input type="password" id="loginPassword" class="search-input" placeholder="输入密码">
                </div>
            </div>

            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 32px;">
                <label style="display: flex; align-items: center; gap: 8px; font-size: 0.85rem; color: var(--text-muted); cursor: pointer;">
                    <input type="checkbox" id="rememberMe" checked style="accent-color: var(--primary)"> 记住登录 7 天
                </label>
                <a href="#" style="font-size: 0.85rem; color: var(--primary); text-decoration: none;">忘记密码？</a>
            </div>

            <button onclick="login()" class="btn btn-primary" style="width: 100%; justify-content: center; padding: 14px;">
                立即登录 <i data-lucide="log-in"></i>
            </button>

            <div style="text-align: center; margin-top: 24px; font-size: 0.9rem; color: var(--text-muted);">
                还没有账号？ <a href="/register.html" style="color: var(--primary); text-decoration: none; font-weight: 600;">立即注册</a>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();

        function checkLoginStatus() {
            const token = localStorage.getItem('token');
            const expiry = localStorage.getItem('tokenExpiry');
            if (token && expiry && new Date().getTime() < parseInt(expiry)) {
                window.location.href = '/';
            }
        }

        function setTokenWithExpiry(token, username) {
            const expiry = new Date().getTime() + (7 * 24 * 60 * 60 * 1000);
            localStorage.setItem('token', token);
            localStorage.setItem('username', username);
            localStorage.setItem('tokenExpiry', expiry.toString());
        }

        async function login() {
            const username = document.getElementById('loginUsername').value;
            const password = document.getElementById('loginPassword').value;
            const rememberMe = document.getElementById('rememberMe').checked;
            const errorElement = document.getElementById('loginError');

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password }),
                });

                const data = await response.json();
                if (response.ok) {
                    if (rememberMe) {
                        setTokenWithExpiry(data.token, username);
                    } else {
                        localStorage.setItem('token', data.token);
                        localStorage.setItem('username', username);
                    }
                    localStorage.setItem('role', data.role || 'free');
                    window.location.href = '/';
                } else {
                    errorElement.style.display = 'block';
                    errorElement.textContent = data.message || '用户名或密码错误';
                }
            } catch (error) {
                errorElement.style.display = 'block';
                errorElement.textContent = '服务器连接超时，请重试';
            }
        }

        window.onload = checkLoginStatus;
    </script>
</body>
</html>
