<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>创意小游戏 - 蛇蛇的开发之旅</title>
    <link rel="stylesheet" href="/css/main.css">
    <!-- Theme Management -->
    <script src="/js/theme.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .games-hero {
            padding: 120px 0 60px;
            text-align: center;
            background: radial-gradient(circle at 50% 0%, var(--primary-glow), transparent 70%);
        }

        .game-card {
            transition: var(--transition);
        }

        .game-card:hover {
            transform: translateY(-12px) scale(1.03);
            box-shadow: 0 20px 40px -10px rgba(16, 185, 129, 0.3);
        }

        .game-badge {
            position: absolute;
            top: 16px;
            left: 16px;
            background: var(--primary);
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
            z-index: 10;
        }

        .play-btn {
            background: var(--primary);
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: absolute;
            bottom: 20px;
            right: 20px;
            opacity: 0;
            transform: scale(0.5);
            transition: var(--transition);
            box-shadow: 0 4px 12px var(--primary-glow);
        }

        .game-card:hover .play-btn {
            opacity: 1;
            transform: scale(1);
        }

        .game-card .card-body {
            padding: 24px;
        }

        .game-card .card-title {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 12px;
            color: var(--text-main);
        }

        .game-card .card-description {
            color: var(--text-dim);
            font-size: 0.95rem;
            margin-bottom: 20px;
            line-height: 1.5;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .game-card .play-link {
            color: var(--primary);
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 1rem;
            transition: var(--transition);
        }

        .game-card:hover .play-link {
            gap: 12px;
        }
    </style>
</head>

<body>
    <header class="header" id="header">
        <div class="container nav">
            <a href="/" class="logo">
                <i data-lucide="terminal"></i>
                <span>蛇蛇</span>的开发之旅
            </a>
            <div style="display: flex; align-items: center; gap: 20px;">
                <button id="themeToggle" class="btn"
                    style="padding: 8px; border: 1px solid var(--border-glass); background: transparent; color: var(--text-main);"
                    onclick="toggleTheme()" title="切换主题">
                    <i data-lucide="sun"></i>
                </button>
                <a href="/" class="btn" style="border: 1px solid var(--border-glass)">
                    <i data-lucide="home"></i> 返回
                </a>
            </div>
        </div>
    </header>

    <main>
        <section class="games-hero">
            <div class="container">
                <h1 class="fade-in" style="font-size: 3.5rem; margin-bottom: 16px;">创意<span
                        style="color: var(--primary)">小游戏</span></h1>
                <p class="fade-in"
                    style="color: var(--text-muted); font-size: 1.1rem; max-width: 600px; margin: 0 auto;">
                    这里展示了我用代码构建的奇妙世界。从经典的复刻到疯狂的创意，每一个像素都跳动着逻辑的旋律。
                </p>
            </div>
        </section>

        <div class="container" style="padding-bottom: 80px;">
            <div class="article-grid" id="gameGrid">
                <!-- 游戏列表将动态加载 -->
                <div style="grid-column: 1/-1; text-align: center; padding: 100px;">
                    <i data-lucide="loader-2" class="animate-spin"
                        style="width: 48px; height: 48px; color: var(--primary); margin-bottom: 16px;"></i>
                    <p>正在寻找宝藏游戏...</p>
                </div>
            </div>
        </div>
    </main>

    <footer style="padding: 40px 0; border-top: 1px solid var(--border-glass); background: rgba(0,0,0,0.2);">
        <div class="container" style="display: flex; flex-direction: column; align-items: center; gap: 20px;">
            <div style="display: flex; gap: 30px; font-size: 0.9rem; color: var(--text-muted);">
                <span>Copyright © 2025 毛蛇蛇</span>
                <a href="https://beian.miit.gov.cn/" target="_blank"
                    style="color: inherit; text-decoration: none;">粤ICP备2025400537号-1</a>
            </div>
        </div>
    </footer>

    <script>
        lucide.createIcons();

        async function loadGames() {
            const grid = document.getElementById('gameGrid');

            try {
                const response = await fetch('/api/articles?category=游戏');
                const data = await response.json();

                if (data.status && data.data.articles.length > 0) {
                    grid.innerHTML = data.data.articles.map(game => `
                        <div class="article-card game-card fade-in" onclick="window.open('/game/${game.content}', '_blank')">
                            <span class="game-badge">精品作品</span>
                            <div style="overflow: hidden; height: 220px;">
                                <img src="${game.coverUrl || '/images/articles/default-game.jpg'}" class="card-image" alt="${game.title}">
                            </div>
                            <div class="card-body">
                                <h3 class="card-title">${game.title}</h3>
                                <p class="card-description">${game.tags === 'mini-game' ? '点击开始挑战，刷新你的最高分！' : (game.summary || '这是一场关于逻辑与速度的精彩冒险。')}</p>
                                <div class="play-link">
                                    <i data-lucide="zap" style="width: 18px; height: 18px;"></i>
                                    点击立即开始
                                </div>
                            </div>
                            <div class="play-btn">
                                <i data-lucide="play" style="fill: white;"></i>
                            </div>
                        </div>
                    `).join('');
                } else {
                    grid.innerHTML = `
                        <div style="grid-column: 1/-1; text-align: center; padding: 100px;">
                            <i data-lucide="ghost" style="width: 48px; height: 48px; color: var(--text-dim); margin-bottom: 16px;"></i>
                            <p style="color: var(--text-dim);">目前还没有发布的小游戏，快去后台发布一个吧！</p>
                        </div>
                    `;
                }
            } catch (err) {
                console.error('加载游戏失败:', err);
                grid.innerHTML = `<p style="grid-column: 1/-1; text-align: center; color: #ef4444;">加载失败，请刷新重试</p>`;
            }

            lucide.createIcons();
        }

        window.onload = loadGames;
    </script>
</body>

</html>
