<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>蛇蛇的开发之旅 - 极客技术博客</title>
    <link rel="stylesheet" href="/css/main.css">
    <!-- Theme Management -->
    <script src="/js/theme.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <header class="header" id="header">
        <div class="container nav">
            <a href="/" class="logo">
                <i data-lucide="terminal"></i>
                <span>蛇蛇</span>的开发之旅
            </a>
            
            <div class="search-container">
                <input type="text" class="search-input" id="searchInput" placeholder="搜索感兴趣的技术..." onkeyup="handleSearchKeyUp(event)">
            </div>

            <div style="display: flex; align-items: center; gap: 16px;">
                <button id="themeToggle" class="btn" style="padding: 8px; border: 1px solid var(--border-glass); background: transparent; color: var(--text-main);" onclick="toggleTheme()" title="切换主题">
                    <i data-lucide="sun"></i>
                </button>
                <div id="userSection">
                    <!-- 由 JS 填充 -->
                    <a href="/login.html" class="btn btn-primary">登录</a>
                </div>
            </div>
        </div>
    </header>

    <main class="container">
        <section class="hero fade-in">
            <h1>探索代码的无限可能</h1>
            <p>专注于 Fullstack 开发、AI 技术集成与极客生活分享。在这里，我们一起进化。</p>
            <div style="display: flex; justify-content: center; gap: 16px;">
                <a href="#articleGrid" class="btn btn-primary">开始阅读 <i data-lucide="arrow-down"></i></a>
                <a href="/games.html" class="btn" style="border: 1px solid var(--border-glass)">创意小游戏 <i data-lucide="gamepad-2"></i></a>
            </div>
        </section>

        <div class="category-filter fade-in" style="display: flex; justify-content: center; gap: 12px; margin-bottom: 30px; flex-wrap: wrap; animation-delay: 0.1s;">
            <button class="btn btn-primary" onclick="setCategory('')" id="cat-all">全部</button>
            <button class="btn" style="border: 1px solid var(--border-glass);" onclick="setCategory('技术')" id="cat-技术">技术</button>
            <button class="btn" style="border: 1px solid var(--border-glass);" onclick="setCategory('游戏')" id="cat-游戏">游戏</button>
            <button class="btn" style="border: 1px solid var(--border-glass);" onclick="setCategory('生活')" id="cat-生活">生活</button>
            <button class="btn" style="border: 1px solid var(--border-glass);" onclick="setCategory('随笔')" id="cat-随笔">随笔</button>
        </div>

        <div class="article-grid" id="articleGrid">
            <!-- 文章将通过JavaScript动态加载 -->
        </div>

        <div class="pagination" id="pagination"></div>
    </main>

    <footer style="padding: 40px 0; border-top: 1px solid var(--border-glass); background: rgba(0,0,0,0.2); margin-top: 80px;">
        <div class="container" style="display: flex; flex-direction: column; align-items: center; gap: 20px;">
            <div style="display: flex; gap: 30px; font-size: 0.9rem; color: var(--text-muted);">
                <span>Copyright © 2025 毛蛇蛇</span>
                <a href="https://beian.miit.gov.cn/" target="_blank" style="color: inherit; text-decoration: none;">粤ICP备2025400537号-1</a>
            </div>
            <a href="https://beian.mps.gov.cn/#/query/webSearch?code=44195002000123" target="_blank" style="display: flex; align-items: center; color: var(--text-dim); text-decoration: none; font-size: 0.8rem; gap: 6px;">
                <img src="https://beian.mps.gov.cn/img/logo01.dd7ff50e.png" alt="公安备案" style="width: 14px; height: 14px;" />
                粤公网安备44195002000123号
            </a>
        </div>
    </footer>

    <script>
        let currentPage = 1;
        const pageSize = 12;
        let searchKeyword = '';
        let currentCategory = '';

        // 处理滚动效果
        window.addEventListener('scroll', () => {
            const header = document.getElementById('header');
            if (window.scrollY > 50) {
                header.classList.add('scrolled');
            } else {
                header.classList.remove('scrolled');
            }
        });

        // 初始化 Lucide 图标
        function initIcons() {
            lucide.createIcons();
        }

        // 处理搜索
        function handleSearch(event) {
            if (event) event.preventDefault();
            searchKeyword = document.getElementById('searchInput').value.trim();
            currentPage = 1;
            loadArticles(1);
        }

        // 处理回车键搜索
        function handleSearchKeyUp(event) {
            if (event.key === 'Enter') {
                handleSearch();
            }
        }

        // 处理分类切换
        function setCategory(category) {
            currentCategory = category;
            
            // 更新按钮样式
            const categories = ['', '技术', '游戏', '生活', '随笔'];
            categories.forEach(cat => {
                const btnId = cat === '' ? 'cat-all' : `cat-${cat}`;
                const btn = document.getElementById(btnId);
                if (btn) {
                    if (cat === category) {
                        btn.className = 'btn btn-primary';
                        btn.style.border = 'none';
                    } else {
                        btn.className = 'btn';
                        btn.style.border = '1px solid var(--border-glass)';
                    }
                }
            });

            // 重新加载数据
            currentPage = 1;
            loadArticles(1);
        }

        // 检查登录状态
        function checkLoginStatus() {
            const token = localStorage.getItem('token');
            const username = localStorage.getItem('username');
            const userSection = document.getElementById('userSection');

            if (token && username) {
                userSection.innerHTML = `
                    <div class="user-menu">
                        <div class="user-trigger">
                            <i data-lucide="user"></i>
                            <span>${username}</span>
                        </div>
                        <div class="user-dropdown">
                            <div class="user-dropdown-inner">
                                <a href="/admin/dashboard.html" class="dropdown-item">
                                    <i data-lucide="layout-dashboard"></i> 控制面板
                                </a>
                                <a href="/admin/articles.html" class="dropdown-item">
                                    <i data-lucide="file-text"></i> 文章管理
                                </a>
                                <a href="javascript:void(0)" class="dropdown-item" onclick="logout()" style="color: #ef4444">
                                    <i data-lucide="log-out"></i> 安全退出
                                </a>
                            </div>
                        </div>
                    </div>
                `;
                initIcons();
            } else {
                userSection.innerHTML = '<a href="/login.html" class="btn btn-primary">登录</a>';
                initIcons();
            }
        }

        // 退出登录
        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('username');
            localStorage.removeItem('tokenExpiry');
            window.location.href = '/';
        }

        // 检查token是否过期
        function checkTokenExpiry() {
            const expiry = localStorage.getItem('tokenExpiry');
            if (expiry && new Date().getTime() > parseInt(expiry)) {
                logout();
                return false;
            }
            return true;
        }

        async function loadArticles(page = 1) {
            try {
                const articleGrid = document.getElementById('articleGrid');
                // 显示蛇形加载器
                articleGrid.innerHTML = `
                    <div class="snake-loader-container" style="grid-column: 1/-1;">
                        <div class="snake-loader"></div>
                        <div class="loader-text">探寻代码之旅...</div>
                    </div>
                `;

                if (!checkTokenExpiry()) return;

                const searchParams = new URLSearchParams({ page, pageSize });
                if (searchKeyword) {
                    searchParams.append('title', searchKeyword);
                    searchParams.append('content', searchKeyword);
                }
                if (currentCategory) {
                    searchParams.append('category', currentCategory);
                }

                const response = await fetch(`/api/articles?${searchParams.toString()}`);
                const data = await response.json();
                
                if (!data.data.articles || data.data.articles.length === 0) {
                    articleGrid.innerHTML = `
                        <div style="grid-column: 1/-1; text-align: center; padding: 80px 0;">
                            <i data-lucide="search-x" style="width: 48px; height: 48px; color: var(--text-dim); margin-bottom: 16px;"></i>
                            <p style="color: var(--text-muted); font-size: 1.1rem;">
                                ${searchKeyword ? '没有找到相关内容' : '暂无内容'}
                            </p>
                        </div>
                    `;
                    document.getElementById('pagination').style.display = 'none';
                    initIcons();
                    return;
                }

                articleGrid.innerHTML = data.data.articles.map((article, index) => {
                    const coverSrc = article.coverUrl || `/images/articles/article${(index % 5) + 1}.jpg`;
                    return `
                    <article class="article-card fade-in" style="animation-delay: ${index * 0.1}s">
                        <a href="/article.html?id=${article.id}" onclick="openArticle(event, '${article.id}')" style="text-decoration: none; color: inherit;">
                            <img src="${coverSrc}" alt="${article.title}" class="card-image">
                            <div class="card-body">
                                <span class="card-category">${article.category || '未分类'}</span>
                                <h2 class="card-title">${article.title}</h2>
                                <div class="card-meta">
                                    <span><i data-lucide="user" style="width: 14px; height: 14px;"></i> ${article.user?.username || '未知'}</span>
                                    <span><i data-lucide="calendar" style="width: 14px; height: 14px;"></i> ${new Date(article.createdAt).toLocaleDateString()}</span>
                                </div>
                                <div style="display: flex; gap: 15px; margin-top: 20px; font-size: 0.8rem; color: var(--text-dim);">
                                    <span><i data-lucide="eye" style="width: 14px; height: 14px;"></i> ${article.views || 0}</span>
                                    <span><i data-lucide="heart" style="width: 14px; height: 14px;"></i> ${article.likes || 0}</span>
                                </div>
                            </div>
                        </a>
                    </article>
                `;
                }).join('');

                document.getElementById('pagination').style.display = 'flex';
                renderPagination(data.data.pagination);
                initIcons();
            } catch (error) {
                console.error('加载失败:', error);
            }
        }

        function renderPagination(pagination) {
            const { total, current, totalPages } = pagination;
            const paginationElement = document.getElementById('pagination');
            
            let html = `
                <button onclick="loadArticles(1)" ${current === 1 ? 'disabled' : ''}><i data-lucide="chevrons-left"></i></button>
                <button onclick="loadArticles(${current - 1})" ${current === 1 ? 'disabled' : ''}><i data-lucide="chevron-left"></i></button>
            `;

            for (let i = Math.max(1, current - 2); i <= Math.min(totalPages, current + 2); i++) {
                html += `<button onclick="loadArticles(${i})" class="${i === current ? 'active' : ''}">${i}</button>`;
            }

            html += `
                <button onclick="loadArticles(${current + 1})" ${current === totalPages ? 'disabled' : ''}><i data-lucide="chevron-right"></i></button>
                <button onclick="loadArticles(${totalPages})" ${current === totalPages ? 'disabled' : ''}><i data-lucide="chevrons-right"></i></button>
            `;

            paginationElement.innerHTML = html;
            initIcons();
        }

        function openArticle(event, articleId) {
            event.preventDefault();
            const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
            if (isMobile) {
                window.location.href = `/article.html?id=${articleId}`;
            } else {
                window.open(`/article.html?id=${articleId}`, '_blank');
            }
        }

        window.onload = () => {
            checkLoginStatus();
            loadArticles(1);
            initIcons();
        };
    </script>
</body>
</html>
