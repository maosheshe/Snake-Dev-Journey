<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 - 蛇蛇的开发之旅</title>
    <link rel="stylesheet" href="/css/main.css">
    <!-- Theme Management -->
    <script src="/js/theme.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .auth-card {
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-glass);
            border-radius: var(--radius-lg);
            width: 100%;
            max-width: 400px;
            padding: 40px;
            box-shadow: var(--shadow-main);
            color: var(--text-main);
        }

        .auth-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .auth-header h2 {
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 8px;
        }

        .auth-header p {
            color: var(--text-muted);
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-dim);
            width: 18px;
            height: 18px;
        }

        .input-wrapper input {
            padding-left: 40px;
        }

        .error-message {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
            padding: 12px;
            border-radius: var(--radius-sm);
            margin-bottom: 24px;
            font-size: 0.9rem;
            display: none;
            border: 1px solid rgba(239, 68, 68, 0.2);
        }
    </style>
</head>
<body>
    <div style="position: fixed; top: 20px; right: 20px; z-index: 100;">
        <button id="themeToggle" class="btn" style="padding: 10px; border: 1px solid var(--border-glass); background: var(--bg-card); color: var(--text-main);" onclick="toggleTheme()" title="切换主题">
            <i data-lucide="sun"></i>
        </button>
    </div>
    <div class="auth-container">
        <div class="auth-card fade-in">
            <div class="auth-header">
                <h2>加入我们</h2>
                <p>开启你的极客开发之旅</p>
            </div>

            <div id="registerError" class="error-message"></div>

            <div class="form-group">
                <label>用户名</label>
                <div class="input-wrapper">
                    <i data-lucide="user"></i>
                    <input type="text" id="registerUsername" class="search-input" placeholder="设置你的用户名">
                </div>
            </div>

            <div class="form-group">
                <label>设置密码</label>
                <div class="input-wrapper">
                    <i data-lucide="lock"></i>
                    <input type="password" id="registerPassword" class="search-input" placeholder="设置 6 位以上密码">
                </div>
            </div>

            <div class="form-group">
                <label>确认密码</label>
                <div class="input-wrapper">
                    <i data-lucide="shield-check"></i>
                    <input type="password" id="confirmPassword" class="search-input" placeholder="再次输入密码">
                </div>
            </div>

            <button onclick="register()" class="btn btn-primary" style="width: 100%; justify-content: center; padding: 14px; margin-top: 8px;">
                立即注册 <i data-lucide="user-plus"></i>
            </button>

            <div style="text-align: center; margin-top: 24px; font-size: 0.9rem; color: var(--text-muted);">
                已经有账号了？ <a href="/login.html" style="color: var(--primary); text-decoration: none; font-weight: 600;">立即登录</a>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();

        async function register() {
            const username = document.getElementById('registerUsername').value;
            const password = document.getElementById('registerPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const errorElement = document.getElementById('registerError');

            if (!username || !password) {
                errorElement.style.display = 'block';
                errorElement.textContent = '请填写完整的注册信息';
                return;
            }

            if (password !== confirmPassword) {
                errorElement.style.display = 'block';
                errorElement.textContent = '两次输入的密码不一致';
                return;
            }

            try {
                const response = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password }),
                });

                const data = await response.json();
                if (response.ok) {
                    window.location.href = '/login.html?registered=true';
                } else {
                    errorElement.style.display = 'block';
                    errorElement.textContent = data.message || '注册失败，用户名可能已存在';
                }
            } catch (error) {
                errorElement.style.display = 'block';
                errorElement.textContent = '服务器连接超时，请重试';
            }
        }
    </script>
</body>
</html>
