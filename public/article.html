<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文章详情 - 蛇蛇的开发之旅</title>
    <link rel="stylesheet" href="/css/main.css">
    <!-- Theme Management -->
    <script src="/js/theme.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* 文章页专用增强样式 */
        .progress-bar {
            position: fixed;
            top: 0;
            left: 0;
            width: 0%;
            height: 4px;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            z-index: 1001;
            transition: width 0.1s ease;
        }

        .article-layout {
            display: grid;
            grid-template-columns: 280px 1fr;
            gap: 40px;
            margin-top: 120px;
            padding-bottom: 80px;
        }

        .article-layout.no-sidebar {
            grid-template-columns: 1fr;
        }

        .article-body {
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            border: 1px solid var(--border-glass);
            padding: 60px;
            box-shadow: var(--shadow-main);
        }

        .article-title {
            font-size: 3rem;
            font-weight: 800;
            margin-bottom: 24px;
            line-height: 1.2;
        }

        .article-meta-header {
            display: flex;
            flex-wrap: wrap;
            gap: 24px;
            padding-bottom: 32px;
            margin-bottom: 40px;
            border-bottom: 1px solid var(--border-glass);
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        .article-meta-header span {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .article-content {
            font-size: 1.15rem;
            line-height: 1.8;
            color: var(--text-main);
        }

        .article-content h1, .article-content h2, .article-content h3 {
            margin: 48px 0 24px;
            color: var(--text-main);
        }

        .article-content p {
            margin-bottom: 24px;
        }

        /* 目录侧边栏 */
        .sidebar {
            position: sticky;
            top: 120px;
            height: fit-content;
        }

        .toc-card {
            background: var(--bg-card);
            border-radius: var(--radius-md);
            border: 1px solid var(--border-glass);
            padding: 24px;
        }

        .toc-title {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .toc-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .toc-link {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.9rem;
            transition: var(--transition);
            display: block;
            border-left: 2px solid transparent;
            padding-left: 12px;
        }

        .toc-link:hover, .toc-link.active {
            color: var(--primary);
            border-left-color: var(--primary);
        }

        /* 响应式 */
        @media (max-width: 1024px) {
            .article-layout { grid-template-columns: 1fr; }
            .sidebar { display: none; }
            .article-body { padding: 30px; }
            .article-title { font-size: 2rem; }
        }

        /* 代码块增强 */
        .code-block {
            margin: 32px 0;
            border-radius: var(--radius-md);
            overflow: hidden;
            border: 1px solid var(--border-glass);
            background: var(--bg-dark);
        }

        .code-header {
            background: var(--bg-dark);
            padding: 8px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-glass);
            color: var(--text-dim);
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        pre {
            background: var(--bg-card);
            border: 1px solid var(--border-glass);
            border-radius: var(--radius-md);
            padding: 24px;
            margin: 24px 0;
            overflow-x: auto;
            position: relative;
        }

        code {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.95rem;
            color: var(--text-main);
        }

        .copy-btn {
            background: none;
            border: 1px solid var(--border-glass);
            color: var(--text-muted);
            padding: 4px 12px;
            border-radius: 4px;
            font-size: 0.75rem;
            cursor: pointer;
            transition: var(--transition);
        }

        .copy-btn:hover {
            color: var(--primary);
            border-color: var(--primary);
        }
    </style>
</head>
<body>
    <div class="progress-bar" id="progressBar"></div>
    
    <header class="header" id="header">
        <div class="container nav">
            <a href="/" class="logo">
                <i data-lucide="terminal"></i>
                <span>蛇蛇</span>的开发之旅
            </a>
            <div style="display: flex; align-items: center; gap: 16px;">
                <button id="themeToggle" class="btn" style="padding: 8px; border: 1px solid var(--border-glass); background: transparent; color: var(--text-main);" onclick="toggleTheme()" title="切换主题">
                    <i data-lucide="sun"></i>
                </button>
                <a href="javascript:void(0)" class="btn" onclick="goBack()" style="border: 1px solid var(--border-glass)">
                    <i data-lucide="arrow-left"></i> 返回
                </a>
            </div>
        </div>
    </header>

    <main class="container article-layout">
        <aside class="sidebar">
            <div class="toc-card">
                <h3 class="toc-title"><i data-lucide="list"></i> 目录</h3>
                <div id="tocList" class="toc-list">
                    <!-- 目录将动态填充 -->
                </div>
            </div>
        </aside>

        <div class="article-body fade-in">
            <article>
                <header>
                    <div id="articleHero" style="margin-bottom: 40px; border-radius: var(--radius-lg); overflow: hidden; display: none; border: 1px solid var(--border-glass);">
                        <img id="heroImage" src="" alt="封面" style="width: 100%; height: 400px; object-fit: cover;">
                    </div>
                    <h1 class="article-title" id="articleTitle">加载中...</h1>
                    <div class="article-meta-header" id="articleMeta">
                        <!-- 由 JS 填充 -->
                    </div>
                    <div id="articleTags" style="display: flex; gap: 8px; margin-bottom: 40px;"></div>
                </header>

                <div class="article-content" id="articleContent">
                    <div style="text-align: center; padding: 40px;">
                        <i data-lucide="loader-2" class="animate-spin" style="width: 32px; height: 32px; color: var(--primary);"></i>
                        <p>内容正在极速加载中...</p>
                    </div>
                </div>

                <div style="margin-top: 60px; padding-top: 40px; border-top: 1px solid var(--border-glass); text-align: center;">
                    <button id="likeBtn" onclick="handleLike()" class="btn" style="background: var(--bg-dark); border: 1px solid #ef4444; color: #ef4444; border-radius: 50px; padding: 12px 32px; gap: 12px;">
                        <i data-lucide="heart"></i>
                        喜欢这篇 <span id="likeCount">0</span>
                    </button>
                </div>
            </article>
        </div>
    </main>

    <footer style="padding: 40px 0; border-top: 1px solid var(--border-glass); background: rgba(0,0,0,0.2); margin-top: 80px;">
        <div class="container" style="display: flex; flex-direction: column; align-items: center; gap: 20px;">
            <div style="display: flex; gap: 30px; font-size: 0.9rem; color: var(--text-muted);">
                <span>Copyright © 2025 毛蛇蛇</span>
                <a href="https://beian.miit.gov.cn/" target="_blank" style="color: inherit; text-decoration: none;">粤ICP备2025400537号-1</a>
            </div>
        </div>
    </footer>

    <script src="/js/marked.min.js"></script>
    <script src="/js/highlight.min.js"></script>
    <link rel="stylesheet" href="/js/github.min.css">
    <script>
        function goBack() {
            if (window.history.length > 1) {
                window.history.back();
            } else {
                window.location.href = '/';
            }
        }

        // 初始化图标
        function initIcons() {
            lucide.createIcons();
        }

        // 进度条逻辑
        window.onscroll = function() {
            const winScroll = document.body.scrollTop || document.documentElement.scrollTop;
            const height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
            const scrolled = (winScroll / height) * 100;
            document.getElementById("progressBar").style.width = scrolled + "%";

            // Header 效果
            const header = document.getElementById('header');
            if (winScroll > 50) header.classList.add('scrolled');
            else header.classList.remove('scrolled');
        };

        // 复制代码功能
        async function copyCode(button) {
            const container = button.closest('.code-block');
            const code = container.querySelector('code').textContent;
            try {
                await navigator.clipboard.writeText(code);
                const originalText = button.innerHTML;
                button.innerHTML = '<i data-lucide="check" style="width:14px;height:14px;"></i> 已复制';
                initIcons();
                setTimeout(() => {
                    button.innerHTML = originalText;
                    initIcons();
                }, 2000);
            } catch (err) {
                button.textContent = '复制失败';
            }
        }

        async function loadArticle() {
            const titleElement = document.getElementById('articleTitle');
            const contentElement = document.getElementById('articleContent');
            const metaElement = document.getElementById('articleMeta');

            try {
                const marked = window.marked;
                if (!marked) throw new Error('解析库未加载');

                const renderer = new marked.Renderer();
                renderer.code = function(code, language) {
                    const escapedCode = code.replace(/</g, '&lt;').replace(/>/g, '&gt;');
                    return `
                        <div class="code-block">
                            <div class="code-header">
                                <span class="code-lang">${language || 'text'}</span>
                                <button class="copy-btn" onclick="copyCode(this)">
                                    <i data-lucide="copy" style="width:14px;height:14px;"></i> 复制
                                </button>
                            </div>
                            <pre><code class="language-${language || 'text'}">${escapedCode}</code></pre>
                        </div>
                    `;
                };

                marked.setOptions({ renderer, breaks: true, gfm: true });

                const urlParams = new URLSearchParams(window.location.search);
                const articleId = urlParams.get('id');
                if (!articleId) throw new Error('无效的文章 ID');

                const response = await fetch(`/api/articles/${articleId}`);
                const data = await response.json();
                if (!data.status) throw new Error(data.message);

                const article = data.data.article;
                document.title = `${article.title} - 蛇蛇的开发之旅`;
                titleElement.textContent = article.title;

                metaElement.innerHTML = `
                    <span><i data-lucide="user"></i> ${article.user?.username || '未知'}</span>
                    <span><i data-lucide="calendar"></i> ${new Date(article.createdAt).toLocaleDateString()}</span>
                    <span><i data-lucide="folder"></i> ${article.category || '未分类'}</span>
                    <span><i data-lucide="eye"></i> ${article.views || 0} 阅读</span>
                `;

                if (article.tags) {
                    document.getElementById('articleTags').innerHTML = article.tags.split(',').map(tag => 
                        `<span style="background: rgba(16,185,129,0.1); color: var(--primary); padding: 4px 12px; border-radius: 4px; font-size: 0.8rem;"># ${tag.trim()}</span>`
                    ).join('');
                }

                if (article.coverUrl) {
                    const hero = document.getElementById('articleHero');
                    const heroImg = document.getElementById('heroImage');
                    heroImg.src = article.coverUrl;
                    hero.style.display = 'block';
                }

                document.getElementById('likeCount').textContent = article.likes || 0;

                const mode = article.displayMode || 'markdown';
                if (mode === 'markdown') {
                    contentElement.innerHTML = marked.parse(article.content || '');
                    if (window.hljs) {
                        document.querySelectorAll('pre code').forEach((block) => hljs.highlightBlock(block));
                    }
                } else {
                    // HTML 注入或 IFrame 模式保持原有逻辑但应用样式
                    contentElement.innerHTML = `<iframe src="/uploads/${article.content}" style="width: 100%; border: none; min-height: 80vh; border-radius: 8px;"></iframe>`;
                }

                generateTOC();
                initIcons();

            } catch (err) {
                contentElement.innerHTML = `<div class="error-card">${err.message}</div>`;
            }
        }

        function generateTOC() {
            const tocList = document.getElementById('tocList');
            const headings = document.querySelectorAll('.article-content h1, .article-content h2, .article-content h3');
            
            if (headings.length === 0) {
                document.querySelector('.sidebar').style.display = 'none';
                document.querySelector('.article-layout').classList.add('no-sidebar');
                return;
            }

            tocList.innerHTML = Array.from(headings).map((heading, index) => {
                const id = `heading-${index}`;
                heading.id = id;
                return `<a href="#${id}" class="toc-link">${heading.textContent}</a>`;
            }).join('');

            // TOC 联动逻辑
            window.addEventListener('scroll', () => {
                let current = '';
                headings.forEach(h => {
                    const top = h.offsetTop;
                    if (pageYOffset >= top - 150) current = h.id;
                });
                document.querySelectorAll('.toc-link').forEach(link => {
                    link.classList.remove('active');
                    if (link.getAttribute('href') === '#' + current) link.classList.add('active');
                });
            });
        }

        async function handleLike() {
            try {
                const urlParams = new URLSearchParams(window.location.search);
                const articleId = urlParams.get('id');
                if (!articleId) return;

                const response = await fetch(`/api/articles/${articleId}/like`, {
                    method: 'POST'
                });
                const data = await response.json();
                
                if (data.status) {
                    document.getElementById('likeCount').textContent = data.data.likes;
                    const likeBtn = document.getElementById('likeBtn');
                    likeBtn.style.background = '#ef4444';
                    likeBtn.style.color = '#fff';
                }
            } catch (error) {
                console.error('点赞失败:', error);
            }
        }

        // 初始化
        window.onload = () => {
            loadArticle();
        };
    </script>
</body>
</html>
