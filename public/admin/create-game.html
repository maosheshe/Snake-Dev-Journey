<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>发布/编辑小游戏 - 蛇蛇的开发之旅</title>
    <link rel="stylesheet" href="/css/main.css">
    <!-- Theme Management -->
    <script src="/js/theme.js"></script>
    <script src="/js/notifications.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .admin-layout {
            padding-top: 120px;
            display: grid;
            grid-template-columns: 280px 1fr;
            gap: 40px;
        }

        .admin-sidebar {
            background: var(--bg-card);
            border: 1px solid var(--border-glass);
            border-radius: var(--radius-lg);
            padding: 30px;
            height: fit-content;
            position: sticky;
            top: 100px;
        }

        .admin-nav-link {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 20px;
            color: var(--text-muted);
            text-decoration: none;
            border-radius: var(--radius-md);
            transition: var(--transition);
        }

        .admin-nav-link:hover, .admin-nav-link.active {
            background: rgba(16, 185, 129, 0.1);
            color: var(--primary);
        }

        .editor-card {
            background: var(--bg-card);
            border: 1px solid var(--border-glass);
            border-radius: var(--radius-lg);
            padding: 40px;
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-muted);
            font-size: 0.9rem;
            font-weight: 600;
        }

        .form-control {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-glass);
            padding: 12px 16px;
            border-radius: var(--radius-md);
            color: var(--text-main);
            font-family: inherit;
            transition: var(--transition);
        }

        .form-control:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 0 4px var(--primary-glow);
        }

        .upload-wrapper {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .upload-wrapper .form-control {
            flex: 1;
            width: auto;
        }

        .file-input-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
        }

        .file-input-wrapper input[type=file] {
            font-size: 100px;
            position: absolute;
            left: 0;
            top: 0;
            opacity: 0;
            cursor: pointer;
        }

        .btn-upload {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid var(--border-glass);
            color: var(--text-main);
            white-space: nowrap;
            padding: 10px 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: var(--transition);
        }

        .btn-upload:hover {
            background: var(--primary);
            border-color: var(--primary);
            color: white;
            box-shadow: 0 0 15px var(--primary-glow);
        }

        #coverPreview {
            width: 100%;
            height: 180px;
            border-radius: var(--radius-md);
            border: 2px dashed var(--border-glass);
            margin-top: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background: rgba(0,0,0,0.3);
            transition: var(--transition);
        }

        #coverPreview img {
            max-width: 100%;
            max-height: 100%;
            object-fit: cover;
        }

        .editor-footer {
            margin-top: 40px;
            display: flex;
            justify-content: flex-end;
            gap: 16px;
            padding-top: 30px;
            border-top: 1px solid var(--border-glass);
        }

        .radio-group {
            display: flex;
            gap: 20px;
            padding: 12px 0;
        }

        .radio-item {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        .game-file-info {
            margin-top: 8px;
            font-size: 0.85rem;
            color: var(--primary);
            display: none;
        }
    </style>
</head>
<body>
    <header class="header" id="header">
        <div class="container nav">
            <a href="/" class="logo">
                <i data-lucide="terminal"></i>
                <span>蛇蛇</span>的开发之旅
            </a>
            <div style="display: flex; align-items: center; gap: 16px;">
                <button id="themeToggle" class="btn" style="padding: 8px; border: 1px solid var(--border-glass); background: transparent; color: var(--text-main);" onclick="toggleTheme()" title="切换主题">
                    <i data-lucide="sun"></i>
                </button>
                <a href="/" class="btn" style="border: 1px solid var(--border-glass)">
                    <i data-lucide="home"></i> 访问首页
                </a>
            </div>
        </div>
    </header>

    <main class="container admin-layout">
        <aside class="admin-sidebar">
            <nav class="admin-nav" style="display: flex; flex-direction: column; gap: 10px;">
                <a href="dashboard.html" class="admin-nav-link"><i data-lucide="layout-dashboard"></i> 仪表盘</a>
                <a href="articles.html" class="admin-nav-link"><i data-lucide="file-text"></i> 文章管理</a>
                <a href="create-article.html" class="admin-nav-link"><i data-lucide="plus-circle"></i> 发布文章</a>
                <a href="create-game.html" class="admin-nav-link active"><i data-lucide="gamepad-2"></i> 发表小游戏</a>
                <a href="javascript:void(0)" onclick="logout()" class="admin-nav-link" style="margin-top: 20px; color: #ef4444;"><i data-lucide="log-out"></i> 安全退出</a>
            </nav>
        </aside>

        <section class="admin-content">
            <h1 id="pageTitle" style="margin-bottom: 30px;">发表新小游戏</h1>

            <form id="gameForm" class="editor-card fade-in">
                <div class="form-group">
                    <label class="form-label">游戏名称</label>
                    <input type="text" id="title" class="form-control" placeholder="输入游戏名称..." required>
                </div>

                <div class="form-group">
                    <label class="form-label">游戏简介</label>
                    <textarea id="summary" class="form-control" style="min-height: 100px;" placeholder="简单介绍一下你的游戏内容..." required></textarea>
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 24px;">
                    <div class="form-group">
                        <label class="form-label">游戏文件 (.html)</label>
                        <div class="upload-wrapper">
                            <input type="text" id="gameFileUrl" class="form-control" placeholder="上传游戏 HTML 文件" readonly required>
                            <div class="file-input-wrapper">
                                <button type="button" class="btn btn-upload">
                                    <i data-lucide="file-up" style="width: 18px; height: 18px;"></i>
                                    <span>上传文件</span>
                                </button>
                                <input type="file" id="gameFileInput" accept=".html" onchange="uploadGameFile(this)">
                            </div>
                        </div>
                        <div id="gameFileInfo" class="game-file-info">
                            <i data-lucide="check-circle" style="width: 14px; height: 14px;"></i> 文件已就绪
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">封面图 (上传或填写 URL)</label>
                        <div class="upload-wrapper">
                            <input type="text" id="cover" class="form-control" placeholder="输入图片 URL 或点击上传">
                            <div class="file-input-wrapper">
                                <button type="button" class="btn btn-upload">
                                    <i data-lucide="image-plus" style="width: 18px; height: 18px;"></i>
                                    <span>本地上传</span>
                                </button>
                                <input type="file" id="coverFile" accept="image/*" onchange="previewImage(this)">
                            </div>
                        </div>
                        <div id="coverPreview">
                            <span style="color: var(--text-dim); font-size: 0.8rem;">预览图</span>
                        </div>
                    </div>
                </div>



                <div class="editor-footer">
                    <button type="button" onclick="history.back()" class="btn" style="border: 1px solid var(--border-glass)">取消</button>
                    <button type="submit" class="btn btn-primary" id="submitBtn">
                        <i data-lucide="zap"></i> <span id="submitText">发布小游戏</span>
                    </button>
                </div>
            </form>
        </section>
    </main>

    <script>
        lucide.createIcons();

        const urlParams = new URLSearchParams(window.location.search);
        const gameId = urlParams.get('id');

        if (gameId) {
            document.getElementById('pageTitle').textContent = '编辑小游戏';
            document.getElementById('submitText').textContent = '保存修改';
            loadGame();
        }

        async function uploadGameFile(input) {
            if (input.files && input.files[0]) {
                const file = input.files[0];
                const gameUrlInput = document.getElementById('gameFileUrl');
                const fileInfo = document.getElementById('gameFileInfo');
                
                try {
                    gameUrlInput.value = '正在上传...';
                    
                    const formData = new FormData();
                    formData.append('htmlFile', file);
                    
                    const token = localStorage.getItem('token');
                    const response = await fetch('/api/upload-html', {
                        method: 'POST',
                        headers: { 'Authorization': `Bearer ${token}` },
                        body: formData
                    });
                    
                    const data = await response.json();
                    if (data.status) {
                        gameUrlInput.value = data.data.filename;
                        fileInfo.style.display = 'flex';
                        fileInfo.innerHTML = `<i data-lucide="check-circle" style="width: 14px; height: 14px; margin-right: 4px;"></i> 文件已上传: ${data.data.filename}`;
                        lucide.createIcons();
                        toast.success('游戏文件上传成功');
                    } else {
                        toast.error('上传失败: ' + data.message);
                        gameUrlInput.value = '';
                    }
                } catch (err) {
                    console.error('上传出错:', err);
                    toast.error('上传过程中发生错误');
                    gameUrlInput.value = '';
                }
            }
        }

        async function previewImage(input) {
            const preview = document.getElementById('coverPreview');
            const coverInput = document.getElementById('cover');
            
            if (input.files && input.files[0]) {
                const file = input.files[0];
                
                const reader = new FileReader();
                reader.onload = function(e) {
                    preview.innerHTML = `<img src="${e.target.result}">`;
                }
                reader.readAsDataURL(file);

                try {
                    preview.innerHTML = `<div class="snake-loader" style="width:30px;height:30px;border-width:2px;"></div>`;
                    
                    const formData = new FormData();
                    formData.append('coverFile', file);
                    
                    const token = localStorage.getItem('token');
                    const uploadRes = await fetch('/api/upload-cover', {
                        method: 'POST',
                        headers: { 'Authorization': `Bearer ${token}` },
                        body: formData
                    });
                    
                    const uploadData = await uploadRes.json();
                    if (uploadData.status) {
                        coverInput.value = uploadData.data.url;
                        preview.innerHTML = `<img src="${uploadData.data.url}">`;
                        toast.success('封面上传成功');
                    } else {
                        toast.error('上传失败: ' + uploadData.message);
                        preview.innerHTML = `<span style="color: #ef4444; font-size: 0.8rem;">上传失败</span>`;
                    }
                } catch (err) {
                    console.error('上传出错:', err);
                    toast.error('图片上传发生错误');
                    preview.innerHTML = `<span style="color: #ef4444; font-size: 0.8rem;">上传错误</span>`;
                }
            }
        }

        document.getElementById('cover').addEventListener('input', (e) => {
            const url = e.target.value.trim();
            const preview = document.getElementById('coverPreview');
            if (url) {
                preview.innerHTML = `<img src="${url}" onerror="this.parentElement.innerHTML='<span style=\'color: var(--text-dim); font-size: 0.8rem;\'>图片预览失败</span>'">`;
            } else {
                preview.innerHTML = `<span style="color: var(--text-dim); font-size: 0.8rem;">预览图</span>`;
            }
        });

        async function loadGame() {
            try {
                const response = await fetch(`/api/articles/${gameId}`);
                const data = await response.json();
                if (data.status) {
                    const article = data.data.article;
                    document.getElementById('title').value = article.title;
                    document.getElementById('summary').value = article.content; // 小游戏的 content 存的是文件名
                    document.getElementById('gameFileUrl').value = article.content;
                    document.getElementById('cover').value = article.coverUrl || '';
                    if (article.coverUrl) {
                        document.getElementById('coverPreview').innerHTML = `<img src="${article.coverUrl}">`;
                    }

                    
                    document.getElementById('gameFileInfo').style.display = 'flex';
                    document.getElementById('gameFileInfo').innerHTML = `<i data-lucide="check-circle" style="width: 14px; height: 14px; margin-right: 4px;"></i> 已关联文件: ${article.content}`;
                    lucide.createIcons();
                }
            } catch (err) {
                console.error(err);
            }
        }

        document.getElementById('gameForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const submitBtn = document.getElementById('submitBtn');
            const submitText = document.getElementById('submitText');
            const originalText = submitText.textContent;
            
            submitBtn.disabled = true;
            submitText.textContent = '处理中...';

            try {
                const token = localStorage.getItem('token');
                const articleData = {
                    title: document.getElementById('title').value,
                    category: '游戏', // 固定分类
                    coverUrl: document.getElementById('cover').value,
                    content: document.getElementById('gameFileUrl').value,
                    summary: document.getElementById('summary').value,
                    displayMode: 'direct', // 统一为 direct 模式（直接打开）
                    tags: 'mini-game'
                };

                const url = gameId ? `/api/articles/${gameId}` : '/api/articles';
                const method = gameId ? 'PUT' : 'POST';

                const response = await fetch(url, {
                    method: method,
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify(articleData)
                });

                if (response.ok) {
                    toast.success(gameId ? '小游戏更新成功' : '小游戏发布成功');
                    setTimeout(() => {
                        window.location.href = 'articles.html';
                    }, 1000);
                } else {
                    const res = await response.json();
                    toast.error(res.message || '未知错误', '保存失败');
                    submitBtn.disabled = false;
                    submitText.textContent = originalText;
                }
            } catch (err) {
                console.error(err);
                toast.error('提交出错，请检查网络');
                submitBtn.disabled = false;
                submitText.textContent = originalText;
            }
        });

        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('username');
            localStorage.removeItem('tokenExpiry');
            window.location.href = '/login.html';
        }
    </script>
</body>
</html>
