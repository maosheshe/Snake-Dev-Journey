<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>发布/编辑文章 - 蛇蛇的开发之旅</title>
    <link rel="stylesheet" href="/css/main.css">
    <!-- Theme Management -->
    <script src="/js/theme.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .admin-layout {
            padding-top: 120px;
            display: grid;
            grid-template-columns: 280px 1fr;
            gap: 40px;
        }

        .admin-sidebar {
            background: var(--bg-card);
            border: 1px solid var(--border-glass);
            border-radius: var(--radius-lg);
            padding: 30px;
            height: fit-content;
            position: sticky;
            top: 100px;
        }

        .admin-nav-link {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 20px;
            color: var(--text-muted);
            text-decoration: none;
            border-radius: var(--radius-md);
            transition: var(--transition);
        }

        .admin-nav-link:hover, .admin-nav-link.active {
            background: rgba(16, 185, 129, 0.1);
            color: var(--primary);
        }

        .editor-card {
            background: var(--bg-card);
            border: 1px solid var(--border-glass);
            border-radius: var(--radius-lg);
            padding: 40px;
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-muted);
            font-size: 0.9rem;
            font-weight: 600;
        }

        .form-control {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-glass);
            padding: 12px 16px;
            border-radius: var(--radius-md);
            color: var(--text-main);
            font-family: inherit;
            transition: var(--transition);
        }

        .form-control:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 0 4px var(--primary-glow);
        }

        textarea.form-control {
            min-height: 400px;
            font-family: 'JetBrains Mono', monospace;
            line-height: 1.6;
            resize: vertical;
        }

        /* 修复下拉菜单在某些浏览器下的样式 */
        select.form-control option {
            background-color: #1a1a1a;
            color: var(--text-main);
        }

        .upload-wrapper {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .upload-wrapper .form-control {
            flex: 1;
            width: auto; /* 覆盖全局的 100% */
        }

        .file-input-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
        }

        .file-input-wrapper input[type=file] {
            font-size: 100px;
            position: absolute;
            left: 0;
            top: 0;
            opacity: 0;
            cursor: pointer;
        }

        .btn-upload {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid var(--border-glass);
            color: var(--text-main);
            white-space: nowrap;
            padding: 10px 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: var(--transition);
        }

        .btn-upload:hover {
            background: var(--primary);
            border-color: var(--primary);
            color: white;
            box-shadow: 0 0 15px var(--primary-glow);
        }

        #coverPreview {
            width: 100%;
            height: 180px;
            border-radius: var(--radius-md);
            border: 2px dashed var(--border-glass);
            margin-top: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background: rgba(0,0,0,0.3);
            transition: var(--transition);
        }

        #coverPreview img {
            max-width: 100%;
            max-height: 100%;
            object-fit: cover;
        }

        .editor-footer {
            margin-top: 40px;
            display: flex;
            justify-content: flex-end;
            gap: 16px;
            padding-top: 30px;
            border-top: 1px solid var(--border-glass);
        }

        .radio-group {
            display: flex;
            gap: 20px;
            padding: 12px 0;
        }

        .radio-item {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <header class="header" id="header">
        <div class="container nav">
            <a href="/" class="logo">
                <i data-lucide="terminal"></i>
                <span>蛇蛇</span>的开发之旅
            </a>
            <div style="display: flex; align-items: center; gap: 16px;">
                <button id="themeToggle" class="btn" style="padding: 8px; border: 1px solid var(--border-glass); background: transparent; color: var(--text-main);" onclick="toggleTheme()" title="切换主题">
                    <i data-lucide="sun"></i>
                </button>
                <a href="/" class="btn" style="border: 1px solid var(--border-glass)">
                    <i data-lucide="home"></i> 访问首页
                </a>
            </div>
        </div>
    </header>

    <main class="container admin-layout">
        <aside class="admin-sidebar">
            <nav class="admin-nav" style="display: flex; flex-direction: column; gap: 10px;">
                <a href="dashboard.html" class="admin-nav-link"><i data-lucide="layout-dashboard"></i> 仪表盘</a>
                <a href="articles.html" class="admin-nav-link"><i data-lucide="file-text"></i> 文章管理</a>
                <a href="create-article.html" class="admin-nav-link active"><i data-lucide="plus-circle"></i> 发布文章</a>
                <a href="javascript:void(0)" onclick="logout()" class="admin-nav-link" style="margin-top: 20px; color: #ef4444;"><i data-lucide="log-out"></i> 安全退出</a>
            </nav>
        </aside>

        <section class="admin-content">
            <h1 id="pageTitle" style="margin-bottom: 30px;">发布新文章</h1>

            <form id="articleForm" class="editor-card fade-in">
                <div class="form-group">
                    <label class="form-label">文章标题</label>
                    <input type="text" id="title" class="form-control" placeholder="输入引人注目的标题..." required>
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 24px;">
                    <div class="form-group">
                        <label class="form-label">分类</label>
                        <select id="category" class="form-control">
                            <option value="技术">技术</option>
                            <option value="游戏">游戏</option>
                            <option value="生活">生活</option>
                            <option value="随笔">随笔</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">封面图 (上传或填写 URL)</label>
                        <div class="upload-wrapper">
                            <input type="text" id="cover" class="form-control" placeholder="输入图片 URL 或点击上传">
                            <div class="file-input-wrapper">
                                <button type="button" class="btn btn-upload">
                                    <i data-lucide="image-plus" style="width: 18px; height: 18px;"></i>
                                    <span>本地上传</span>
                                </button>
                                <input type="file" id="coverFile" accept="image/*" onchange="previewImage(this)">
                            </div>
                        </div>
                        <div id="coverPreview">
                            <span style="color: var(--text-dim); font-size: 0.8rem;">预览图</span>
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">显示模式</label>
                    <div class="radio-group">
                        <label class="radio-item">
                            <input type="radio" name="displayMode" value="markdown" checked> Markdown 渲染
                        </label>
                        <label class="radio-item">
                            <input type="radio" name="displayMode" value="inject"> HTML 注入 (适合小游戏)
                        </label>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">内容</label>
                    <textarea id="content" class="form-control" placeholder="在此处开始你的创作...支持 Markdown 语法。" required></textarea>
                </div>

                <div class="editor-footer">
                    <button type="button" onclick="history.back()" class="btn" style="border: 1px solid var(--border-glass)">取消</button>
                    <button type="submit" class="btn btn-primary" id="submitBtn">
                        <i data-lucide="send"></i> <span id="submitText">发布文章</span>
                    </button>
                </div>
            </form>
        </section>
    </main>

    <script>
        lucide.createIcons();

        const urlParams = new URLSearchParams(window.location.search);
        const articleId = urlParams.get('id');

        // 如果有 ID，说明是编辑模式
        if (articleId) {
            document.getElementById('pageTitle').textContent = '编辑文章';
            document.getElementById('submitText').textContent = '保存修改';
            loadArticle();
        }

        function previewImage(input) {
            const preview = document.getElementById('coverPreview');
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    preview.innerHTML = `<img src="${e.target.result}">`;
                }
                reader.readAsDataURL(input.files[0]);
            }
        }

        async function loadArticle() {
            try {
                const response = await fetch(`/api/articles/${articleId}`);
                const data = await response.json();
                if (data.status) {
                    const article = data.data.article;
                    document.getElementById('title').value = article.title;
                    document.getElementById('category').value = article.category;
                    document.getElementById('cover').value = article.coverUrl || '';
                    if (article.coverUrl) {
                        document.getElementById('coverPreview').innerHTML = `<img src="${article.coverUrl}">`;
                    }
                    document.getElementById('content').value = article.content;
                    const radio = document.querySelector(`input[name="displayMode"][value="${article.displayMode || 'markdown'}"]`);
                    if (radio) radio.checked = true;
                }
            } catch (err) {
                console.error(err);
            }
        }
        // 剪贴板粘贴图片支持
        document.getElementById('content').addEventListener('paste', async (e) => {
            const items = (e.clipboardData || e.originalEvent.clipboardData).items;
            for (const item of items) {
                if (item.type.indexOf('image') !== -1) {
                    e.preventDefault(); // 阻止默认的粘贴文本行为
                    const file = item.getAsFile();
                    const formData = new FormData();
                    formData.append('image', file);
                    
                    const textarea = e.target;
                    const startPos = textarea.selectionStart;
                    const endPos = textarea.selectionEnd;
                    
                    // 插入加载提示
                    const placeholder = '\n![正在上传图片...](uploading)\n';
                    textarea.value = textarea.value.substring(0, startPos) + placeholder + textarea.value.substring(endPos);
                    
                    try {
                        const token = localStorage.getItem('token');
                        const response = await fetch('/api/upload-image', {
                            method: 'POST',
                            headers: { 'Authorization': `Bearer ${token}` },
                            body: formData
                        });
                        const data = await response.json();
                        if (data.status) {
                            const markdownImage = `\n![图片](${data.data.url})\n`;
                            textarea.value = textarea.value.replace(placeholder, markdownImage);
                        } else {
                            textarea.value = textarea.value.replace(placeholder, '\n![图片上传失败](' + data.message + ')\n');
                        }
                    } catch (err) {
                        textarea.value = textarea.value.replace(placeholder, '\n![图片上传出错]()\n');
                    }
                }
            }
        });

        document.getElementById('articleForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const submitBtn = document.getElementById('submitBtn');
            const submitText = document.getElementById('submitText');
            const originalText = submitText.textContent;
            
            submitBtn.disabled = true;
            submitText.textContent = '处理中...';

            let coverUrl = document.getElementById('cover').value;
            const coverFile = document.getElementById('coverFile').files[0];

            try {
                const token = localStorage.getItem('token');

                // 如果有新上传的文件，先上传
                if (coverFile) {
                    const formData = new FormData();
                    formData.append('coverFile', coverFile);
                    
                    const uploadRes = await fetch('/api/upload-cover', {
                        method: 'POST',
                        headers: {
                            'Authorization': `Bearer ${token}`
                        },
                        body: formData
                    });
                    
                    const uploadData = await uploadRes.json();
                    if (uploadData.status) {
                        coverUrl = uploadData.data.url;
                    } else {
                        throw new Error('封面上传失败: ' + uploadData.message);
                    }
                }

                const submitArticle = async (forceSave = false) => {
                    const articleData = {
                        title: document.getElementById('title').value,
                        category: document.getElementById('category').value,
                        coverUrl: coverUrl,
                        content: document.getElementById('content').value,
                        displayMode: document.querySelector('input[name="displayMode"]:checked').value,
                        forceSave: forceSave
                    };

                    const url = articleId ? `/api/articles/${articleId}` : '/api/articles';
                    const method = articleId ? 'PUT' : 'POST';

                    const response = await fetch(url, {
                        method: method,
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${token}`
                        },
                        body: JSON.stringify(articleData)
                    });

                    if (response.ok) {
                        window.location.href = 'articles.html';
                    } else {
                        // 尝试解析 JSON，如果失败则可能是 Nginx 拦截导致的 HTML 页面
                        try {
                            const res = await response.json();
                            
                            if (res.errorCode === 'DOWNLOAD_FAILED') {
                                if (confirm('无法下载外部图片（链接可能无效或响应超时），是否使用默认图片继续发布？')) {
                                    // 用户选择使用默认图片
                                    coverUrl = ''; // 清空 URL，后端会根据分类随机分配或前端指定
                                    // 也可以在这里指定一个默认图片
                                    // coverUrl = '/images/articles/article1.jpg';
                                    return submitArticle(true); // 递归调用，设置 forceSave 为 true
                                } else {
                                    // 用户选择返回修改
                                    submitBtn.disabled = false;
                                    submitText.textContent = originalText;
                                    return;
                                }
                            }

                            alert('保存失败: ' + (res.message || '未知错误'));
                        } catch (e) {
                            if (response.status === 413) {
                                alert('保存失败：内容或图片体积过大，超出了服务器限制。请尝试压缩图片或分段提交。');
                            } else {
                                // 用户选择返回修改
                                submitBtn.disabled = false;
                                submitText.textContent = originalText;
                                return;
                            }
                        }

                        submitBtn.disabled = false;
                        submitText.textContent = originalText;
                    }
                };

                await submitArticle();
            } catch (err) {
                console.error(err);
                alert(err.message || '提交出错，请检查网络');
                submitBtn.disabled = false;
                submitText.textContent = originalText;
            }
        });

        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('username');
            localStorage.removeItem('tokenExpiry');
            window.location.href = '/login.html';
        }
    </script>
</body>
</html>
