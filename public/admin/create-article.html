<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新建文章 - 蛇蛇的开发之旅</title>
    <script src="/js/marked.min.js"></script>
    <script src="/js/highlight.min.js"></script>
    <link rel="stylesheet" href="/js/github.min.css">
    <style>
        :root {
            --primary-color: #1890ff;
            --bg-color: #f0f2f5;
            --text-color: #333;
            --border-color: #d9d9d9;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .navbar {
            background: #fff;
            padding: 0 20px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            z-index: 100;
        }
        .navbar h1 {
            font-size: 18px;
            margin: 0;
            color: var(--primary-color);
        }
        .nav-actions {
            display: flex;
            gap: 12px;
        }
        .main-container {
            flex: 1;
            display: flex;
            overflow: hidden;
            padding: 20px;
            gap: 20px;
        }
        .editor-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 15px;
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            overflow-y: auto;
        }
        .preview-section {
            flex: 1;
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            overflow-y: auto;
            border: 1px solid var(--border-color);
        }
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .form-row {
            display: flex;
            gap: 15px;
        }
        .form-row .form-group {
            flex: 1;
        }
        label {
            font-weight: 600;
            font-size: 14px;
            color: #555;
        }
        input[type="text"], select, textarea {
            padding: 10px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            font-size: 14px;
            transition: border-color 0.2s;
        }
        input[type="text"]:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--primary-color);
        }
        textarea {
            height: 300px;
            resize: none;
            font-family: 'Fira Code', 'Courier New', monospace;
            line-height: 1.6;
        }
        .btn {
            padding: 8px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s;
            text-decoration: none;
            font-size: 14px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }
        .btn-primary {
            background: var(--primary-color);
            color: #fff;
        }
        .btn-primary:hover {
            background: #40a9ff;
        }
        .btn-default {
            background: #fff;
            border: 1px solid var(--border-color);
            color: #666;
        }
        .btn-default:hover {
            color: var(--primary-color);
            border-color: var(--primary-color);
        }
        .upload-box {
            border: 2px dashed var(--border-color);
            padding: 20px;
            text-align: center;
            border-radius: 8px;
            background: #fafafa;
        }
        .upload-box:hover {
            border-color: var(--primary-color);
        }
        /* Markdown Preview Styles */
        .preview-content {
            line-height: 1.8;
            color: #1f2329;
        }
        .preview-content h1, .preview-content h2, .preview-content h3 {
            border-bottom: 1px solid #eaecef;
            padding-bottom: 0.3em;
        }
        .preview-content pre {
            background: #f6f8fa;
            padding: 16px;
            border-radius: 6px;
            overflow: auto;
        }
        iframe.preview-iframe {
            width: 100%;
            height: 500px;
            border: 1px solid #eee;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div class="navbar">
        <h1>新建文章</h1>
        <div class="nav-actions">
            <a href="articles.html" class="btn btn-default">返回列表</a>
            <button onclick="createArticle()" class="btn btn-primary">发布文章</button>
        </div>
    </div>

    <div class="main-container">
        <div class="editor-section">
            <div class="form-group">
                <label for="title">文章标题</label>
                <input type="text" id="title" placeholder="输入文章标题..." autocomplete="off">
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label for="category">文章分类</label>
                    <input type="text" id="category" placeholder="例如：技术、生活..." list="categoryList">
                    <datalist id="categoryList">
                        <option value="技术">
                        <option value="生活">
                        <option value="游戏">
                        <option value="教程">
                    </datalist>
                </div>
                <div class="form-group">
                    <label for="tags">标签 (用逗号分隔)</label>
                    <input type="text" id="tags" placeholder="例如：JS, Node, 教程">
                </div>
            </div>
            
            <div class="form-group">
                <label for="displayMode">展示模式</label>
                <select id="displayMode" onchange="handleModeChange()">
                    <option value="markdown">Markdown 渲染</option>
                    <option value="inject">HTML 内容注入 (提取正文)</option>
                    <option value="iframe">HTML IFrame 嵌入 (适用于小游戏)</option>
                </select>
            </div>

            <!-- HTML 上传区域 -->
            <div id="htmlUploadArea" class="form-group" style="display: none;">
                <label>HTML 文件管理</label>
                <div class="upload-box">
                    <input type="file" id="htmlFile" accept=".html" style="display: none;" onchange="handleFileSelect()">
                    <button class="btn btn-default" onclick="document.getElementById('htmlFile').click()">
                        选择 HTML 文件
                    </button>
                    <span id="fileNameDisplay" style="margin: 0 10px; color: #888;">未选择文件</span>
                    <button id="uploadBtn" class="btn btn-primary" onclick="uploadHTML()" style="display: none;">
                        上传并关联
                    </button>
                </div>
                <input type="text" id="htmlPath" readonly placeholder="上传成功后此处将显示路径" style="background: #f5f5f5;">
            </div>

            <!-- Markdown 内容区域 -->
            <div id="markdownArea" class="form-group" style="flex: 1; display: flex; flex-direction: column;">
                <label for="content">正文内容 (Markdown)</label>
                <textarea id="content" placeholder="开始写作..." oninput="updatePreview()" style="flex: 1;"></textarea>
            </div>
        </div>

        <div class="preview-section">
            <div id="previewHeader" style="margin-bottom: 10px; color: #999; font-size: 12px; font-weight: bold; text-transform: uppercase;">实时预览</div>
            <div id="preview" class="preview-content"></div>
        </div>
    </div>

    <script>
        // 初始化 Marked
        marked.setOptions({
            highlight: function(code, lang) {
                if (window.hljs) {
                    return hljs.highlightAuto(code).value;
                }
                return code;
            },
            breaks: true,
            gfm: true
        });

        function handleModeChange() {
            const mode = document.getElementById('displayMode').value;
            const markdownArea = document.getElementById('markdownArea');
            const htmlUploadArea = document.getElementById('htmlUploadArea');
            const previewHeader = document.getElementById('previewHeader');

            if (mode === 'markdown') {
                markdownArea.style.display = 'flex';
                htmlUploadArea.style.display = 'none';
                previewHeader.textContent = 'Markdown 预览';
            } else {
                markdownArea.style.display = 'none';
                htmlUploadArea.style.display = 'flex';
                previewHeader.textContent = mode === 'inject' ? 'HTML 注入预览' : 'IFrame 预览';
            }
            updatePreview();
        }

        function handleFileSelect() {
            const file = document.getElementById('htmlFile').files[0];
            const display = document.getElementById('fileNameDisplay');
            const uploadBtn = document.getElementById('uploadBtn');
            if (file) {
                display.textContent = file.name;
                uploadBtn.style.display = 'inline-flex';
            }
        }

        async function uploadHTML() {
            const fileInput = document.getElementById('htmlFile');
            if (!fileInput.files[0]) return;

            const formData = new FormData();
            formData.append('htmlFile', fileInput.files[0]);

            try {
                const token = localStorage.getItem('token');
                const response = await fetch('/api/upload-html', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${token}`
                    },
                    body: formData
                });

                const result = await response.json();
                if (result.status) {
                    document.getElementById('htmlPath').value = result.data.filename;
                    alert('上传成功！');
                    updatePreview();
                } else {
                    alert('上传失败：' + result.message);
                }
            } catch (err) {
                alert('上传出错');
            }
        }

        async function updatePreview() {
            const mode = document.getElementById('displayMode').value;
            const preview = document.getElementById('preview');

            if (mode === 'markdown') {
                const content = document.getElementById('content').value;
                preview.innerHTML = marked.parse(content || '*预览内容将显示在这里...*');
            } else {
                const filename = document.getElementById('htmlPath').value;
                if (!filename) {
                    preview.innerHTML = '<p style="color:#999">上传 HTML 文件后即可预览</p>';
                    return;
                }

                if (mode === 'inject') {
                    const res = await fetch('/uploads/' + filename);
                    const html = await res.text();
                    const doc = new DOMParser().parseFromString(html, 'text/html');
                    const bodyContent = doc.body.innerHTML;
                    const styleContent = Array.from(doc.querySelectorAll('style')).map(s => s.outerHTML).join('');
                    preview.innerHTML = `<div>${styleContent}${bodyContent}</div>`;
                } else {
                    preview.innerHTML = `<iframe src="/uploads/${filename}" class="preview-iframe"></iframe>`;
                }
            }
        }

        async function createArticle() {
            const title = document.getElementById('title').value.trim();
            const mode = document.getElementById('displayMode').value;
            const category = document.getElementById('category').value.trim();
            const tags = document.getElementById('tags').value.trim();
            
            let content = '';
            if (mode === 'markdown') {
                content = document.getElementById('content').value.trim();
            } else {
                content = document.getElementById('htmlPath').value.trim();
            }

            if (!title || !content) {
                alert('标题和内容（或HTML路径）不能为空');
                return;
            }

            try {
                const token = localStorage.getItem('token');
                const response = await fetch('/api/articles', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ 
                        title, 
                        content, 
                        category, 
                        tags, 
                        displayMode: mode 
                    }),
                });

                const data = await response.json();
                if (response.ok) {
                    alert('文章发布成功！');
                    window.location.href = 'articles.html';
                } else {
                    alert('发布失败：' + (data.message || '未知错误'));
                }
            } catch (error) {
                alert('发布出错，请检查网络');
            }
        }

        window.onload = () => {
            const token = localStorage.getItem('token');
            if (!token) window.location.href = '/login.html';
            updatePreview();
        };
    </script>
</body>
</html>
