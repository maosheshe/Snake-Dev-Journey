<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>发布/编辑文章 - 蛇蛇的开发之旅</title>
    <link rel="stylesheet" href="/css/main.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .admin-layout {
            padding-top: 120px;
            display: grid;
            grid-template-columns: 280px 1fr;
            gap: 40px;
        }

        .admin-sidebar {
            background: var(--bg-card);
            border: 1px solid var(--border-glass);
            border-radius: var(--radius-lg);
            padding: 30px;
            height: fit-content;
            position: sticky;
            top: 100px;
        }

        .admin-nav-link {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 20px;
            color: var(--text-muted);
            text-decoration: none;
            border-radius: var(--radius-md);
            transition: var(--transition);
        }

        .admin-nav-link:hover, .admin-nav-link.active {
            background: rgba(16, 185, 129, 0.1);
            color: var(--primary);
        }

        .editor-card {
            background: var(--bg-card);
            border: 1px solid var(--border-glass);
            border-radius: var(--radius-lg);
            padding: 40px;
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-muted);
            font-size: 0.9rem;
            font-weight: 600;
        }

        .form-control {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-glass);
            padding: 12px 16px;
            border-radius: var(--radius-md);
            color: var(--text-main);
            font-family: inherit;
            transition: var(--transition);
        }

        .form-control:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 0 4px var(--primary-glow);
        }

        textarea.form-control {
            min-height: 400px;
            font-family: 'JetBrains Mono', monospace;
            line-height: 1.6;
            resize: vertical;
        }

        .editor-footer {
            margin-top: 40px;
            display: flex;
            justify-content: flex-end;
            gap: 16px;
            padding-top: 30px;
            border-top: 1px solid var(--border-glass);
        }

        .radio-group {
            display: flex;
            gap: 20px;
            padding: 12px 0;
        }

        .radio-item {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <header class="header" id="header">
        <div class="container nav">
            <a href="/" class="logo">
                <i data-lucide="terminal"></i>
                <span>蛇蛇</span>的开发之旅
            </a>
            <div style="display: flex; gap: 20px;">
                <a href="/" class="btn" style="border: 1px solid var(--border-glass)">
                    <i data-lucide="home"></i> 访问首页
                </a>
            </div>
        </div>
    </header>

    <main class="container admin-layout">
        <aside class="admin-sidebar">
            <nav class="admin-nav" style="display: flex; flex-direction: column; gap: 10px;">
                <a href="dashboard.html" class="admin-nav-link"><i data-lucide="layout-dashboard"></i> 仪表盘</a>
                <a href="articles.html" class="admin-nav-link"><i data-lucide="file-text"></i> 文章管理</a>
                <a href="create-article.html" class="admin-nav-link active"><i data-lucide="plus-circle"></i> 发布文章</a>
                <a href="javascript:void(0)" onclick="logout()" class="admin-nav-link" style="margin-top: 20px; color: #ef4444;"><i data-lucide="log-out"></i> 安全退出</a>
            </nav>
        </aside>

        <section class="admin-content">
            <h1 id="pageTitle" style="margin-bottom: 30px;">发布新文章</h1>

            <form id="articleForm" class="editor-card fade-in">
                <div class="form-group">
                    <label class="form-label">文章标题</label>
                    <input type="text" id="title" class="form-control" placeholder="输入引人注目的标题..." required>
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 24px;">
                    <div class="form-group">
                        <label class="form-label">分类</label>
                        <select id="category" class="form-control">
                            <option value="技术">技术</option>
                            <option value="游戏">游戏</option>
                            <option value="生活">生活</option>
                            <option value="随笔">随笔</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">封面图 URL (可选)</label>
                        <input type="text" id="cover" class="form-control" placeholder="https://example.com/image.jpg">
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">显示模式</label>
                    <div class="radio-group">
                        <label class="radio-item">
                            <input type="radio" name="displayMode" value="markdown" checked> Markdown 渲染
                        </label>
                        <label class="radio-item">
                            <input type="radio" name="displayMode" value="html"> HTML 注入 (适合小游戏)
                        </label>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">内容</label>
                    <textarea id="content" class="form-control" placeholder="在此处开始你的创作...支持 Markdown 语法。" required></textarea>
                </div>

                <div class="editor-footer">
                    <button type="button" onclick="history.back()" class="btn" style="border: 1px solid var(--border-glass)">取消</button>
                    <button type="submit" class="btn btn-primary" id="submitBtn">
                        <i data-lucide="send"></i> <span id="submitText">发布文章</span>
                    </button>
                </div>
            </form>
        </section>
    </main>

    <script>
        lucide.createIcons();

        const urlParams = new URLSearchParams(window.location.search);
        const articleId = urlParams.get('id');

        // 如果有 ID，说明是编辑模式
        if (articleId) {
            document.getElementById('pageTitle').textContent = '编辑文章';
            document.getElementById('submitText').textContent = '保存修改';
            loadArticle();
        }

        async function loadArticle() {
            try {
                const response = await fetch(`/api/articles/${articleId}`);
                const data = await response.json();
                if (data.status) {
                    const article = data.data.article;
                    document.getElementById('title').value = article.title;
                    document.getElementById('category').value = article.category;
                    document.getElementById('cover').value = article.cover || '';
                    document.getElementById('content').value = article.content;
                    const radio = document.querySelector(`input[name="displayMode"][value="${article.displayMode || 'markdown'}"]`);
                    if (radio) radio.checked = true;
                }
            } catch (err) {
                console.error(err);
            }
        }

        document.getElementById('articleForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = true;

            const articleData = {
                title: document.getElementById('title').value,
                category: document.getElementById('category').value,
                cover: document.getElementById('cover').value,
                content: document.getElementById('content').value,
                displayMode: document.querySelector('input[name="displayMode"]:checked').value
            };

            try {
                const token = localStorage.getItem('token');
                const url = articleId ? `/api/articles/${articleId}` : '/api/articles';
                const method = articleId ? 'PUT' : 'POST';

                const response = await fetch(url, {
                    method: method,
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify(articleData)
                });

                if (response.ok) {
                    window.location.href = 'articles.html';
                } else {
                    const res = await response.json();
                    alert('保存失败: ' + res.message);
                    submitBtn.disabled = false;
                }
            } catch (err) {
                console.error(err);
                alert('提交出错，请检查网络');
                submitBtn.disabled = false;
            }
        });

        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('username');
            localStorage.removeItem('tokenExpiry');
            window.location.href = '/login.html';
        }
    </script>
</body>
</html>
