<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文章管理 - 蛇蛇的开发之旅</title>
    <link rel="stylesheet" href="/css/main.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .admin-layout {
            padding-top: 120px;
            display: grid;
            grid-template-columns: 280px 1fr;
            gap: 40px;
        }

        .admin-sidebar {
            background: var(--bg-card);
            border: 1px solid var(--border-glass);
            border-radius: var(--radius-lg);
            padding: 30px;
            height: fit-content;
            position: sticky;
            top: 100px;
        }

        .admin-nav-link {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 20px;
            color: var(--text-muted);
            text-decoration: none;
            border-radius: var(--radius-md);
            transition: var(--transition);
        }

        .admin-nav-link:hover, .admin-nav-link.active {
            background: rgba(16, 185, 129, 0.1);
            color: var(--primary);
        }

        .article-table-card {
            background: var(--bg-card);
            border: 1px solid var(--border-glass);
            border-radius: var(--radius-lg);
            overflow: hidden;
        }

        .admin-table {
            width: 100%;
            border-collapse: collapse;
        }

        .admin-table th {
            background: rgba(255, 255, 255, 0.03);
            text-align: left;
            padding: 16px 24px;
            color: var(--text-dim);
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 1px solid var(--border-glass);
        }

        .admin-table td {
            padding: 20px 24px;
            border-bottom: 1px solid var(--border-glass);
            color: var(--text-main);
        }

        .admin-table tr:hover {
            background: rgba(255, 255, 255, 0.02);
        }

        .badge {
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .badge-tech { background: rgba(59, 130, 246, 0.1); color: #3b82f6; }
        .badge-game { background: rgba(16, 185, 129, 0.1); color: #10b981; }
        .badge-none { background: rgba(148, 163, 184, 0.1); color: #94a3b8; }

        .action-btns {
            display: flex;
            gap: 8px;
        }

        .action-btn {
            width: 36px;
            height: 36px;
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid var(--border-glass);
            background: rgba(255,255,255,0.05);
            color: var(--text-muted);
            transition: var(--transition);
            cursor: pointer;
        }

        .action-btn:hover {
            color: var(--primary);
            border-color: var(--primary);
            background: rgba(16, 185, 129, 0.1);
        }

        .action-btn.delete:hover {
            color: #ef4444;
            border-color: #ef4444;
            background: rgba(239, 68, 68, 0.1);
        }
    </style>
</head>
<body>
    <header class="header" id="header">
        <div class="container nav">
            <a href="/" class="logo">
                <i data-lucide="terminal"></i>
                <span>蛇蛇</span>的开发之旅
            </a>
            <div style="display: flex; gap: 20px;">
                <a href="/" class="btn" style="border: 1px solid var(--border-glass)">
                    <i data-lucide="home"></i> 访问首页
                </a>
            </div>
        </div>
    </header>

    <main class="container admin-layout">
        <aside class="admin-sidebar">
            <nav class="admin-nav" style="display: flex; flex-direction: column; gap: 10px;">
                <a href="dashboard.html" class="admin-nav-link"><i data-lucide="layout-dashboard"></i> 仪表盘</a>
                <a href="articles.html" class="admin-nav-link active"><i data-lucide="file-text"></i> 文章管理</a>
                <a href="create-article.html" class="admin-nav-link"><i data-lucide="plus-circle"></i> 发布文章</a>
                <a href="javascript:void(0)" onclick="logout()" class="admin-nav-link" style="margin-top: 20px; color: #ef4444;"><i data-lucide="log-out"></i> 安全退出</a>
            </nav>
        </aside>

        <section class="admin-content">
            <div class="header-actions" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
                <h1 style="font-size: 2rem;">所有文章</h1>
                <a href="create-article.html" class="btn btn-primary">
                    <i data-lucide="plus"></i> 新增文章
                </a>
            </div>

            <div class="article-table-card fade-in">
                <table class="admin-table">
                    <thead>
                        <tr>
                            <th>标题</th>
                            <th>分类</th>
                            <th>数据</th>
                            <th>日期</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="articleList">
                        <!-- 由 JS 填充 -->
                        <tr>
                            <td colspan="5" style="text-align: center; padding: 60px;">
                                <i data-lucide="loader-2" class="animate-spin" style="margin-bottom: 12px; color: var(--primary);"></i>
                                <p style="color: var(--text-dim);">正在搬运文章...</p>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
            
            <div class="pagination" id="pagination"></div>
        </section>
    </main>

    <script>
        lucide.createIcons();

        let currentPage = 1;
        const pageSize = 10;

        async function loadArticles(page = 1) {
            try {
                const response = await fetch(`/api/articles?page=${page}&pageSize=${pageSize}`);
                const data = await response.json();
                
                const list = document.getElementById('articleList');
                list.innerHTML = data.data.articles.map(article => {
                    const categoryClass = article.category === '游戏' ? 'badge-game' : (article.category === '技术' ? 'badge-tech' : 'badge-none');
                    return `
                        <tr>
                            <td>
                                <div style="font-weight: 600; margin-bottom: 4px;">${article.title}</div>
                                <div style="font-size: 0.8rem; color: var(--text-dim);">ID: ${article.id}</div>
                            </td>
                            <td><span class="badge ${categoryClass}">${article.category || '未分类'}</span></td>
                            <td>
                                <div style="display: flex; gap: 12px; font-size: 0.85rem; color: var(--text-muted);">
                                    <span title="阅读量"><i data-lucide="eye" style="width:14px; height:14px; vertical-align:middle;"></i> ${article.views || 0}</span>
                                    <span title="获赞数"><i data-lucide="heart" style="width:14px; height:14px; vertical-align:middle;"></i> ${article.likes || 0}</span>
                                </div>
                            </td>
                            <td style="color: var(--text-dim); font-size: 0.85rem;">
                                ${new Date(article.createdAt).toLocaleDateString()}
                            </td>
                            <td>
                                <div class="action-btns">
                                    <a href="article-detail.html?id=${article.id}" class="action-btn" title="详情"><i data-lucide="external-link" style="width:16px;"></i></a>
                                    <a href="create-article.html?id=${article.id}" class="action-btn" title="编辑"><i data-lucide="edit-3" style="width:16px;"></i></a>
                                    <button onclick="deleteArticle(${article.id})" class="action-btn delete" title="删除"><i data-lucide="trash-2" style="width:16px;"></i></button>
                                </div>
                            </td>
                        </tr>
                    `;
                }).join('');
                
                lucide.createIcons();
                renderPagination(data.data.pagination);
            } catch (error) {
                console.error('加载文章列表错误:', error);
            }
        }

        function renderPagination(pagination) {
            const { current, totalPages } = pagination;
            const paginationElement = document.getElementById('pagination');
            
            let html = '';
            for (let i = 1; i <= totalPages; i++) {
                html += `<button onclick="loadArticles(${i})" class="${i === current ? 'active' : ''}">${i}</button>`;
            }
            paginationElement.innerHTML = html;
        }

        async function deleteArticle(id) {
            if (!confirm('确定要删除这篇文章吗？此操作不可逆。')) return;
            try {
                const token = localStorage.getItem('token');
                const response = await fetch(`/api/articles/${id}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (response.ok) {
                    loadArticles(currentPage);
                } else {
                    alert('删除失败');
                }
            } catch (err) {
                console.error(err);
            }
        }

        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('username');
            localStorage.removeItem('tokenExpiry');
            window.location.href = '/login.html';
        }

        window.onload = () => {
            loadArticles(1);
        };
    </script>
</body>
</html>
