<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理控制台 - 蛇蛇的开发之旅</title>
    <link rel="stylesheet" href="/css/main.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .admin-layout {
            padding-top: 120px;
            display: grid;
            grid-template-columns: 280px 1fr;
            gap: 40px;
        }

        .admin-sidebar {
            background: var(--bg-card);
            border: 1px solid var(--border-glass);
            border-radius: var(--radius-lg);
            padding: 30px;
            height: fit-content;
            position: sticky;
            top: 100px;
        }

        .admin-nav {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .admin-nav-link {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 20px;
            color: var(--text-muted);
            text-decoration: none;
            border-radius: var(--radius-md);
            transition: var(--transition);
        }

        .admin-nav-link:hover, .admin-nav-link.active {
            background: rgba(16, 185, 129, 0.1);
            color: var(--primary);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border-glass);
            border-radius: var(--radius-md);
            padding: 24px;
            text-align: center;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 4px;
        }

        .stat-label {
            color: var(--text-dim);
            font-size: 0.875rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <header class="header" id="header">
        <div class="container nav">
            <a href="/" class="logo">
                <i data-lucide="terminal"></i>
                <span>蛇蛇</span>的开发之旅
            </a>
            <div style="display: flex; gap: 20px;">
                <a href="/" class="btn" style="border: 1px solid var(--border-glass)">
                    <i data-lucide="home"></i> 访问首页
                </a>
            </div>
        </div>
    </header>

    <main class="container admin-layout">
        <aside class="admin-sidebar">
            <div style="margin-bottom: 30px; text-align: center;">
                <div style="width: 80px; height: 80px; background: linear-gradient(135deg, var(--primary), var(--secondary)); border-radius: 50%; margin: 0 auto 16px; display: flex; align-items: center; justify-content: center;">
                    <i data-lucide="user" style="width: 40px; height: 40px; color: white;"></i>
                </div>
                <h3 id="displayUsername" style="margin-bottom: 4px;">管理员</h3>
                <p id="displayRole" style="color: var(--text-dim); font-size: 0.8rem;">超级管理员权限</p>
            </div>
            <nav class="admin-nav">
                <a href="dashboard.html" class="admin-nav-link active"><i data-lucide="layout-dashboard"></i> 仪表盘</a>
                <a href="articles.html" class="admin-nav-link"><i data-lucide="file-text"></i> 文章管理</a>
                <a href="create-article.html" class="admin-nav-link"><i data-lucide="plus-circle"></i> 发布文章</a>
                <a href="javascript:void(0)" onclick="logout()" class="admin-nav-link" style="margin-top: 20px; color: #ef4444;"><i data-lucide="log-out"></i> 安全退出</a>
            </nav>
        </aside>

        <section class="admin-content">
            <div class="fade-in">
                <h1 style="margin-bottom: 8px;">欢迎回来，<span id="welcomeName">管理员</span></h1>
                <p style="color: var(--text-muted); margin-bottom: 40px;">这是你的博客管理中心，你可以管理所有文章和查看统计数据。</p>

                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-value" id="totalArticles">--</div>
                        <div class="stat-label">文章总数</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="totalViews">--</div>
                        <div class="stat-label">总阅读量</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="totalLikes">--</div>
                        <div class="stat-label">总获赞数</div>
                    </div>
                </div>

                <div style="background: var(--bg-card); border: 1px solid var(--border-glass); border-radius: var(--radius-lg); padding: 40px; text-align: center;">
                    <i data-lucide="sparkles" style="width: 48px; height: 48px; color: var(--primary); margin-bottom: 20px;"></i>
                    <h2 style="margin-bottom: 16px;">准备好创作了吗？</h2>
                    <p style="color: var(--text-muted); margin-bottom: 30px; max-width: 500px; margin-left: auto; margin-right: auto;">
                        记录你的奇思妙想，分享你的技术心得。每一篇文字都是一段进化的旅程。
                    </p>
                    <a href="create-article.html" class="btn btn-primary" style="padding: 14px 40px;">
                        <i data-lucide="plus"></i> 立即发布新文章
                    </a>
                </div>
            </div>
        </section>
    </main>

    <script>
        lucide.createIcons();

        function checkAuth() {
            const token = localStorage.getItem('token');
            const username = localStorage.getItem('username');
            if (!token || !username) {
                window.location.href = '/login.html';
                return;
            }
            document.getElementById('displayUsername').textContent = username;
            document.getElementById('welcomeName').textContent = username;
            
            const role = localStorage.getItem('role');
            const roleElement = document.getElementById('displayRole');
            if (role === 'admin') {
                roleElement.textContent = '超级管理员权限';
                roleElement.style.color = 'var(--primary)';
            } else {
                roleElement.textContent = '博客作者权限';
                roleElement.style.color = 'var(--text-dim)';
            }
        }

        async function loadStats() {
            try {
                const token = localStorage.getItem('token');
                const response = await fetch('/api/articles?pageSize=1000', {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });
                const data = await response.json();
                if (data.status) {
                    const articles = data.data.articles;
                    document.getElementById('totalArticles').textContent = articles.length;
                    
                    const views = articles.reduce((sum, a) => sum + (a.views || 0), 0);
                    const likes = articles.reduce((sum, a) => sum + (a.likes || 0), 0);
                    
                    document.getElementById('totalViews').textContent = views;
                    document.getElementById('totalLikes').textContent = likes;
                }
            } catch (err) {
                console.error('获取统计失败:', err);
            }
        }

        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('username');
            localStorage.removeItem('tokenExpiry');
            window.location.href = '/login.html';
        }

        window.onload = () => {
            checkAuth();
            loadStats();
        };
    </script>
</body>
</html>
