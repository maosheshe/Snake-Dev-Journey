<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理预览 - 蛇蛇的开发之旅</title>
    <link rel="stylesheet" href="/css/main.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="/js/marked.min.js"></script>
    <script src="/js/highlight.min.js"></script>
    <link rel="stylesheet" href="/js/github.min.css">
    <style>
        .admin-layout {
            padding-top: 120px;
            display: grid;
            grid-template-columns: 280px 1fr;
            gap: 40px;
        }

        .admin-sidebar {
            background: var(--bg-card);
            border: 1px solid var(--border-glass);
            border-radius: var(--radius-lg);
            padding: 30px;
            height: fit-content;
            position: sticky;
            top: 100px;
        }

        .admin-nav-link {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 20px;
            color: var(--text-muted);
            text-decoration: none;
            border-radius: var(--radius-md);
            transition: var(--transition);
        }

        .admin-nav-link:hover, .admin-nav-link.active {
            background: rgba(16, 185, 129, 0.1);
            color: var(--primary);
        }

        .preview-card {
            background: var(--bg-card);
            border: 1px solid var(--border-glass);
            border-radius: var(--radius-lg);
            padding: 50px;
        }

        .article-content {
            font-size: 1.1rem;
            line-height: 1.8;
            color: var(--text-main);
        }

        .article-content h1, .article-content h2, .article-content h3 {
            margin: 40px 0 20px;
            color: var(--text-main);
        }

        .article-content pre {
            background: rgba(0,0,0,0.3);
            padding: 20px;
            border-radius: var(--radius-md);
            border: 1px solid var(--border-glass);
            overflow-x: auto;
            margin: 24px 0;
        }

        .article-content code {
            font-family: 'JetBrains Mono', monospace;
        }
    </style>
</head>
<body>
    <header class="header" id="header">
        <div class="container nav">
            <a href="/" class="logo">
                <i data-lucide="terminal"></i>
                <span>蛇蛇</span>的开发之旅
            </a>
            <div style="display: flex; gap: 20px;">
                <a href="/" class="btn" style="border: 1px solid var(--border-glass)">
                    <i data-lucide="home"></i> 访问首页
                </a>
            </div>
        </div>
    </header>

    <main class="container admin-layout">
        <aside class="admin-sidebar">
            <nav class="admin-nav" style="display: flex; flex-direction: column; gap: 10px;">
                <a href="dashboard.html" class="admin-nav-link"><i data-lucide="layout-dashboard"></i> 仪表盘</a>
                <a href="articles.html" class="admin-nav-link active"><i data-lucide="file-text"></i> 文章管理</a>
                <a href="create-article.html" class="admin-nav-link"><i data-lucide="plus-circle"></i> 发布文章</a>
                <a href="javascript:void(0)" onclick="logout()" class="admin-nav-link" style="margin-top: 20px; color: #ef4444;"><i data-lucide="log-out"></i> 安全退出</a>
            </nav>
        </aside>

        <section class="admin-content">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
                <button onclick="history.back()" class="btn" style="border: 1px solid var(--border-glass)">
                    <i data-lucide="arrow-left"></i> 返回列表
                </button>
                <a id="editLink" href="#" class="btn btn-primary">
                    <i data-lucide="edit-3"></i> 编辑此文
                </a>
            </div>

            <div class="preview-card fade-in">
                <h1 id="articleTitle" style="font-size: 2.5rem; margin-bottom: 16px;">加载中...</h1>
                <div id="articleMeta" style="display: flex; gap: 20px; color: var(--text-dim); margin-bottom: 40px; padding-bottom: 24px; border-bottom: 1px solid var(--border-glass);">
                    <!-- Meta info -->
                </div>
                
                <div class="article-content" id="articleContent">
                    <p style="text-align: center; padding: 40px;">正在努力加载内容...</p>
                </div>
            </div>
        </section>
    </main>

    <script>
        lucide.createIcons();

        const urlParams = new URLSearchParams(window.location.search);
        const articleId = urlParams.get('id');

        if (!articleId) {
            window.location.href = 'articles.html';
        }

        document.getElementById('editLink').href = `create-article.html?id=${articleId}`;

        async function loadArticle() {
            try {
                const response = await fetch(`/api/articles/${articleId}`);
                const data = await response.json();
                
                if (data.status) {
                    const article = data.data.article;
                    document.getElementById('articleTitle').textContent = article.title;
                    document.getElementById('articleMeta').innerHTML = `
                        <span>作者: ${article.user?.username || '未知'}</span>
                        <span>日期: ${new Date(article.createdAt).toLocaleDateString()}</span>
                        <span>分类: ${article.category || '未分类'}</span>
                    `;
                    
                    const content = document.getElementById('articleContent');
                    if (article.displayMode === 'html') {
                        content.innerHTML = `<iframe src="/uploads/${article.content}" style="width: 100%; border: none; min-height: 80vh; border-radius: 8px;"></iframe>`;
                    } else {
                        content.innerHTML = marked.parse(article.content || '');
                        if (window.hljs) {
                            content.querySelectorAll('pre code').forEach((block) => hljs.highlightBlock(block));
                        }
                    }
                }
            } catch (err) {
                console.error(err);
                document.getElementById('articleContent').innerHTML = '<p style="color: #ef4444;">加载失败，请检查网络</p>';
            }
        }

        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('username');
            localStorage.removeItem('tokenExpiry');
            window.location.href = '/login.html';
        }

        window.onload = loadArticle;
    </script>
</body>
</html>
