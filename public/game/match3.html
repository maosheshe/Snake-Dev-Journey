<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>霓虹消消乐 - Neon Match-3</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Noto+Sans+SC:wght@300;400;700&display=swap">
    <style>
        :root {
            --bg-dark: #0a0e17;
            --bg-panel: #111827;
            --primary: #00d4ff;
            --secondary: #7c3aed;
            --accent: #f472b6;
            --success: #10b981;
            --error: #ef4444;
            --text: #e2e8f0;
            --text-muted: #94a3b8;
            --grid-bg: rgba(0, 0, 0, 0.3);
            --cell-bg: rgba(255, 255, 255, 0.02);
            --glow: 0 0 15px rgba(0, 212, 255, 0.4);
            
            /* Gem Colors */
            --gem-blue: #00d4ff;
            --gem-purple: #7c3aed;
            --gem-pink: #f472b6;
            --gem-green: #10b981;
            --gem-orange: #fb923c;
            --gem-yellow: #facc15;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: var(--bg-dark);
            background-image: 
                radial-gradient(ellipse at 20% 80%, rgba(124, 58, 237, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(0, 212, 255, 0.1) 0%, transparent 50%);
            font-family: 'Noto Sans SC', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow: hidden;
            position: relative;
        }

        /* 动态背景网格 */
        body::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background-image: 
                linear-gradient(rgba(0, 212, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 212, 255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            transform: perspective(500px) rotateX(60deg);
            animation: gridMove 20s linear infinite;
            z-index: 1;
        }

        @keyframes gridMove {
            0% { transform: perspective(500px) rotateX(60deg) translateY(0); }
            100% { transform: perspective(500px) rotateX(60deg) translateY(50px); }
        }

        .container {
            background: linear-gradient(145deg, var(--bg-panel) 0%, #0d1117 100%);
            border-radius: 24px;
            padding: 24px;
            box-shadow: 
                0 0 60px rgba(0, 212, 255, 0.1),
                0 25px 50px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(0, 212, 255, 0.2);
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 500px;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            text-align: center;
            color: var(--text);
            font-size: 1.8rem;
            margin-bottom: 4px;
            text-shadow: 0 0 20px rgba(0, 212, 255, 0.5);
            letter-spacing: 2px;
        }

        h1 span {
            background: linear-gradient(90deg, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header-info {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 15px;
        }

        .level-badge {
            background: linear-gradient(135deg, var(--secondary), var(--accent));
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.8rem;
            box-shadow: 0 4px 10px rgba(124, 58, 237, 0.3);
        }

        .controls {
            display: flex;
            gap: 8px;
            margin-bottom: 10px;
            justify-content: center;
        }

        /* 道具栏 */
        .tool-bar {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 15px;
            padding: 10px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .tool-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .tool-item:hover { transform: scale(1.1); }
        .tool-item.active { filter: drop-shadow(0 0 10px var(--primary)); }

        .tool-icon {
            font-size: 1.5rem;
            margin-bottom: 2px;
        }

        .tool-count {
            font-size: 0.6rem;
            color: var(--text-muted);
            background: rgba(0, 0, 0, 0.5);
            padding: 2px 6px;
            border-radius: 10px;
        }

        .btn {
            font-family: 'Orbitron', sans-serif;
            padding: 8px 14px;
            border: none;
            border-radius: 10px;
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.2s;
            background: rgba(255, 255, 255, 0.05);
            color: var(--text);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--primary);
            color: var(--primary);
            box-shadow: 0 0 10px rgba(0, 212, 255, 0.3);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            filter: grayscale(1);
        }

        /* 统计面板样式 */
        .stats-panel {
            position: fixed;
            top: 0;
            right: -320px;
            width: 300px;
            height: 100vh;
            background: var(--bg-panel);
            border-left: 1px solid rgba(0, 212, 255, 0.2);
            padding: 30px 20px;
            z-index: 1100;
            transition: right 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: -10px 0 30px rgba(0, 0, 0, 0.5);
        }

        .stats-panel.active {
            right: 0;
        }

        .stats-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .stats-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.4rem;
            color: var(--primary);
        }

        .stats-close {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 1.5rem;
            cursor: pointer;
        }

        .stats-item {
            background: rgba(0, 0, 0, 0.3);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 15px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .stats-val {
            display: block;
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5rem;
            color: var(--primary);
        }

        .stats-label {
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        /* 提示高亮样式 */
        .gem.hint {
            animation: hintPulse 0.5s infinite alternate;
            z-index: 5;
            filter: drop-shadow(0 0 15px #fff);
        }

        @keyframes hintPulse {
            from { transform: scale(1); filter: drop-shadow(0 0 5px #fff); }
            to { transform: scale(1.1); filter: drop-shadow(0 0 20px #fff); }
        }

        .timer-warning {
            color: var(--error) !important;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            50% { opacity: 0.5; }
        }

        /* 游戏看板 */
        .game-area {
            position: relative;
            margin: 0 auto;
            aspect-ratio: 1/1;
            background: var(--grid-bg);
            border-radius: 16px;
            border: 2px solid rgba(0, 212, 255, 0.1);
            padding: 10px;
            overflow: hidden;
        }

        .game-grid {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            grid-template-rows: repeat(8, 1fr);
            gap: 6px;
            height: 100%;
            width: 100%;
        }

        .cell {
            background: var(--cell-bg);
            border-radius: 8px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .gem {
            width: 90%;
            height: 90%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            user-select: none;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            filter: drop-shadow(0 0 5px rgba(0,0,0,0.5));
            position: absolute;
            z-index: 2;
        }

        .gem.selected {
            transform: scale(1.15);
            filter: drop-shadow(0 0 10px currentColor);
            animation: pulse 1s infinite alternate;
            z-index: 3;
        }

        /* 特殊宝石样式 */
        .gem.special-bomb {
            border: 2px dashed var(--error);
            border-radius: 50%;
            animation: bombGlow 1s infinite alternate;
        }

        .gem.special-rocket {
            border: 2px dashed var(--primary);
            animation: rocketGlow 1s infinite alternate;
        }

        @keyframes bombGlow {
            from { box-shadow: 0 0 5px var(--error); }
            to { box-shadow: 0 0 20px var(--error); }
        }

        @keyframes rocketGlow {
            from { box-shadow: 0 0 5px var(--primary); }
            to { box-shadow: 0 0 20px var(--primary); }
        }

        .gem.swapping {
            z-index: 10;
        }

        /* 特殊宝石样式 */
        .gem.special-bomb {
            border: 2px dashed var(--error);
            border-radius: 50%;
            animation: bombGlow 1s infinite alternate;
        }

        .gem.special-rocket {
            border: 2px dashed var(--primary);
            animation: rocketGlow 1s infinite alternate;
        }

        @keyframes bombGlow {
            from { box-shadow: 0 0 5px var(--error); }
            to { box-shadow: 0 0 20px var(--error); }
        }

        @keyframes rocketGlow {
            from { box-shadow: 0 0 5px var(--primary); }
            to { box-shadow: 0 0 20px var(--primary); }
        }

        .gem.falling {
            transition: top 0.3s cubic-bezier(0.5, 0, 0.5, 1);
        }

        /* Stats & Info */
        .game-info {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 15px;
            padding: 10px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
        }

        .info-item {
            text-align: center;
        }

        .info-label {
            font-size: 0.65rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .info-value {
            font-family: 'Orbitron', sans-serif;
            font-size: 1rem;
            color: var(--primary);
        }

        /* Particles & Popups */
        #particleCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 99;
        }

        .combo-popup {
            position: fixed;
            pointer-events: none;
            color: var(--accent);
            font-family: 'Orbitron', sans-serif;
            font-weight: bold;
            font-size: 2rem;
            text-shadow: 0 0 15px var(--accent);
            z-index: 1000;
            animation: comboAnim 0.8s ease-out forwards;
        }

        .score-popup {
            position: fixed;
            pointer-events: none;
            color: var(--primary);
            font-family: 'Orbitron', sans-serif;
            font-weight: bold;
            font-size: 1.2rem;
            text-shadow: 0 0 10px var(--primary);
            z-index: 1000;
            animation: scoreAnim 0.6s ease-out forwards;
        }

        @keyframes comboAnim {
            0% { transform: scale(0.5) translateY(0); opacity: 0; }
            50% { transform: scale(1.2) translateY(-20px); opacity: 1; }
            100% { transform: scale(1) translateY(-50px); opacity: 0; }
        }

        @keyframes scoreAnim {
            0% { transform: translateY(0); opacity: 0; }
            20% { opacity: 1; }
            100% { transform: translateY(-30px); opacity: 0; }
        }

        /* Modals */
        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(8px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal.active { display: flex; }

        .modal-content {
            background: var(--bg-panel);
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            border: 2px solid var(--primary);
            box-shadow: 0 0 40px rgba(0, 212, 255, 0.2);
            max-width: 350px;
            width: 90%;
        }

        .modal h2 {
            font-family: 'Orbitron', sans-serif;
            margin-bottom: 10px;
            color: var(--primary);
        }

        .modal p { color: var(--text-muted); margin-bottom: 20px; }

        @media (max-width: 400px) {
            .gem { font-size: 1.5rem; }
            .container { padding: 15px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1><span>霓虹</span>消消乐</h1>
        <div class="header-info">
            <div class="level-badge" id="levelDisplay">Level 1</div>
            <div class="level-badge" id="targetDisplay">Goal: 1000</div>
        </div>

        <div class="controls">
            <button class="btn" id="resetBtn">重置</button>
            <button class="btn" id="hintBtn">提示 (3)</button>
            <button class="btn" id="statsBtn">统计</button>
            <button class="btn" id="musicToggle">🔊 音乐</button>
        </div>

        <div class="tool-bar">
            <div class="tool-item" id="toolHammer">
                <span class="tool-icon">🔨</span>
                <span class="tool-count" id="hammerCount">1</span>
            </div>
            <div class="tool-item" id="toolShuffle">
                <span class="tool-icon">🔀</span>
                <span class="tool-count" id="shuffleCount">1</span>
            </div>
        </div>

        <div class="game-area">
            <div class="game-grid" id="gameGrid"></div>
        </div>

        <div class="game-info">
            <div class="info-item">
                <div class="info-label">分数</div>
                <div class="info-value" id="scoreDisplay">0</div>
            </div>
            <div class="info-item">
                <div class="info-label">步数</div>
                <div class="info-value" id="movesDisplay">20</div>
            </div>
            <div class="info-item">
                <div class="info-label">时间</div>
                <div class="info-value" id="timerDisplay">60</div>
            </div>
            <div class="info-item">
                <div class="info-label">最高分</div>
                <div class="info-value" id="bestDisplay">0</div>
            </div>
        </div>
    </div>

    <div class="stats-panel" id="statsPanel">
        <div class="stats-header">
            <div class="stats-title">游戏统计</div>
            <button class="stats-close" id="statsClose">&times;</button>
        </div>
        <div class="stats-item">
            <span class="stats-val" id="statGames">0</span>
            <span class="stats-label">已玩局数</span>
        </div>
        <div class="stats-item">
            <span class="stats-val" id="statBest">0</span>
            <span class="stats-label">最高得分</span>
        </div>
        <div class="stats-item">
            <span class="stats-val" id="statTotalScore">0</span>
            <span class="stats-label">累计总分</span>
        </div>
        <button class="btn" id="clearStats" style="width: 100%; margin-top: 20px;">清空统计数据</button>
    </div>

    <canvas id="particleCanvas"></canvas>

    <div class="modal" id="gameOverModal">
        <div class="modal-content">
            <h2 id="modalTitle">游戏结束</h2>
            <p id="modalMsg">你的最终分数是: 0</p>
            <button class="btn" id="modalBtn" style="width: 100%; padding: 12px;">重试</button>
        </div>
    </div>

    <script>
        const GEM_TYPES = [
            { icon: '💎', color: 'var(--gem-blue)', id: 0 },
            { icon: '⭐', color: 'var(--gem-yellow)', id: 1 },
            { icon: '🌙', color: 'var(--gem-purple)', id: 2 },
            { icon: '☀️', color: 'var(--gem-orange)', id: 3 },
            { icon: '❄️', color: 'var(--gem-blue)', id: 4 },
            { icon: '🌸', color: 'var(--gem-pink)', id: 5 }
        ];

        class Match3 {
            constructor() {
                this.gridSize = 8;
                this.score = 0;
                this.moves = 20;
                this.level = 1;
                this.targetScore = 1000;
                this.grid = [];
                this.selectedGem = null;
                this.isProcessing = false;
                this.combo = 0;
                
                this.timeLeft = 60;
                this.timerInterval = null;
                this.hintsLeft = 3;
                
                this.hammersLeft = 1;
                this.shufflesLeft = 1;
                this.activeTool = null;
                
                this.stats = JSON.parse(localStorage.getItem('match3_stats')) || {
                    totalScore: 0,
                    gamesPlayed: 0,
                    bestScore: 0
                };

                this.initDOM();
                this.initAudio();
                this.initParticles();
                this.newGame();
                this.animate();
            }

            initDOM() {
                this.gridEl = document.getElementById('gameGrid');
                this.scoreEl = document.getElementById('scoreDisplay');
                this.movesEl = document.getElementById('movesDisplay');
                this.bestEl = document.getElementById('bestDisplay');
                this.levelEl = document.getElementById('levelDisplay');
                this.targetEl = document.getElementById('targetDisplay');
                this.timerEl = document.getElementById('timerDisplay');
                this.hintBtn = document.getElementById('hintBtn');
                
                this.bestEl.textContent = this.stats.bestScore;

                document.getElementById('resetBtn').onclick = () => this.newGame();
                document.getElementById('modalBtn').onclick = () => {
                    document.getElementById('gameOverModal').classList.remove('active');
                    this.newGame();
                };
                
                document.getElementById('statsBtn').onclick = () => this.toggleStats(true);
                document.getElementById('statsClose').onclick = () => this.toggleStats(false);
                document.getElementById('clearStats').onclick = () => {
                    if(confirm('确定要清空统计数据吗？')) {
                        this.stats = { totalScore: 0, gamesPlayed: 0, bestScore: 0 };
                        this.saveStats();
                        this.updateStatsUI();
                        this.bestEl.textContent = 0;
                    }
                };

                this.hintBtn.onclick = () => this.useHint();
                
                this.musicToggle = document.getElementById('musicToggle');
                this.isMusicOn = false;
                this.musicToggle.onclick = () => this.toggleMusic();

                // 道具绑定
                document.getElementById('toolHammer').onclick = () => this.selectTool('hammer');
                document.getElementById('toolShuffle').onclick = () => this.useShuffle();
            }

            selectTool(type) {
                if (this.isProcessing) return;
                if (type === 'hammer' && this.hammersLeft <= 0) return;
                
                if (this.activeTool === type) {
                    this.activeTool = null;
                    document.getElementById('toolHammer').classList.remove('active');
                } else {
                    this.activeTool = type;
                    document.getElementById('toolHammer').classList.add('active');
                    this.playSound('select');
                }
            }

            newGame() {
                this.score = 0;
                this.moves = 25 - Math.min(this.level, 10);
                this.targetScore = 800 + (this.level - 1) * 400; // 降低初始目标，减缓增幅
                this.timeLeft = 60 + (this.level * 10);
                this.hintsLeft = 3;
                this.hammersLeft = 1;
                this.shufflesLeft = 1;
                this.updateToolUI();
                
                this.hintBtn.disabled = false;
                this.hintBtn.textContent = `提示 (${this.hintsLeft})`;
                this.clearHints();
                this.updateUI();
                this.createGrid();
                this.startTimer();
                this.isProcessing = false;
            }

            updateToolUI() {
                document.getElementById('hammerCount').textContent = this.hammersLeft;
                document.getElementById('shuffleCount').textContent = this.shufflesLeft;
            }

            async useShuffle() {
                if (this.isProcessing || this.shufflesLeft <= 0) return;
                this.shufflesLeft--;
                this.updateToolUI();
                this.playSound('match', 2);
                this.createGrid();
            }

            createGrid() {
                this.gridEl.innerHTML = '';
                this.grid = [];
                for (let r = 0; r < this.gridSize; r++) {
                    this.grid[r] = [];
                    for (let c = 0; c < this.gridSize; c++) {
                        const gemType = this.getRandomGemType(r, c);
                        const gem = this.createGemElement(r, c, gemType);
                        this.grid[r][c] = { type: gemType, el: gem };
                        this.gridEl.appendChild(gem);
                    }
                }
            }

            getRandomGemType(r, c) {
                let type;
                do {
                    type = GEM_TYPES[Math.floor(Math.random() * GEM_TYPES.length)];
                } while (
                    (c >= 2 && this.grid[r][c-1].type.id === type.id && this.grid[r][c-2].type.id === type.id) ||
                    (r >= 2 && this.grid[r-1][c].type.id === type.id && this.grid[r-2][c].type.id === type.id)
                );
                return type;
            }

            createGemElement(r, c, type) {
                const el = document.createElement('div');
                el.className = 'gem';
                el.textContent = type.icon;
                el.style.color = type.color;
                el.dataset.r = r;
                el.dataset.c = c;
                this.setGemPosition(el, r, c);
                el.addEventListener('click', (e) => this.handleGemClick(e));
                return el;
            }

            setGemPosition(el, r, c) {
                const cellSize = 100 / this.gridSize;
                el.style.top = `${r * cellSize}%`;
                el.style.left = `${c * cellSize}%`;
                el.style.width = `${cellSize}%`;
                el.style.height = `${cellSize}%`;
            }

            async handleGemClick(e) {
                if (this.isProcessing || this.moves <= 0) return;

                const el = e.currentTarget;
                const r = parseInt(el.dataset.r);
                const c = parseInt(el.dataset.c);

                // 使用锤子道具
                if (this.activeTool === 'hammer') {
                    this.useHammer(r, c);
                    return;
                }

                const clickedGem = this.grid[r][c];
                
                if (!this.selectedGem) {
                    this.selectedGem = { r, c, ...clickedGem };
                    clickedGem.el.classList.add('selected');
                    this.playSound('select');
                } else {
                    const dr = Math.abs(this.selectedGem.r - r);
                    const dc = Math.abs(this.selectedGem.c - c);

                    if ((dr === 1 && dc === 0) || (dr === 0 && dc === 1)) {
                        const prevR = this.selectedGem.r;
                        const prevC = this.selectedGem.c;
                        this.selectedGem.el.classList.remove('selected');
                        this.selectedGem = null; // 清除选中状态以防连击时干扰
                        
                        await this.swapGems(prevR, prevC, r, c);
                        
                        const matches = this.findMatches();
                        if (matches.length > 0) {
                            this.moves--;
                            this.combo = 0;
                            await this.processMatches();
                        } else {
                            // No match, swap back
                            await this.swapGems(prevR, prevC, r, c);
                            this.playSound('error');
                        }
                        this.checkGameState();
                    } else if (dr === 0 && dc === 0) {
                        // 取消选中
                        this.selectedGem.el.classList.remove('selected');
                        this.selectedGem = null;
                        this.playSound('select');
                    } else {
                        // 重新选中
                        this.selectedGem.el.classList.remove('selected');
                        this.selectedGem = { r, c, ...clickedGem };
                        clickedGem.el.classList.add('selected');
                        this.playSound('select');
                    }
                }
            }

            async swapGems(r1, c1, r2, c2) {
                this.isProcessing = true;
                const gem1 = this.grid[r1][c1];
                const gem2 = this.grid[r2][c2];

                // Swap in data
                this.grid[r1][c1] = gem2;
                this.grid[r2][c2] = gem1;

                // Update UI position
                this.setGemPosition(gem1.el, r2, c2);
                this.setGemPosition(gem2.el, r1, c1);
                
                gem1.el.dataset.r = r2; gem1.el.dataset.c = c2;
                gem2.el.dataset.r = r1; gem2.el.dataset.c = c1;

                await new Promise(r => setTimeout(r, 300));
                this.isProcessing = false;
            }

            async useHammer(r, c) {
                const gem = this.grid[r][c];
                if (!gem) return;
                
                this.hammersLeft--;
                this.updateToolUI();
                this.activeTool = null;
                document.getElementById('toolHammer').classList.remove('active');
                
                this.isProcessing = true;
                this.playSound('match', 3);
                this.createExplosion(gem.el, gem.type.color);
                gem.el.remove();
                this.grid[r][c] = null;
                
                await this.dropGems();
                await this.processMatches();
                this.isProcessing = false;
            }

            findMatches() {
                const matches = new Set();
                
                // Horizontal
                for (let r = 0; r < this.gridSize; r++) {
                    for (let c = 0; c < this.gridSize - 2; c++) {
                        if (!this.grid[r][c] || !this.grid[r][c+1] || !this.grid[r][c+2]) continue;
                        const typeId = this.grid[r][c].type.id;
                        if (typeId === this.grid[r][c+1].type.id && typeId === this.grid[r][c+2].type.id) {
                            matches.add(`${r},${c}`);
                            matches.add(`${r},${c+1}`);
                            matches.add(`${r},${c+2}`);
                        }
                    }
                }

                // Vertical
                for (let c = 0; c < this.gridSize; c++) {
                    for (let r = 0; r < this.gridSize - 2; r++) {
                        if (!this.grid[r][c] || !this.grid[r+1][c] || !this.grid[r+2][c]) continue;
                        const typeId = this.grid[r][c].type.id;
                        if (typeId === this.grid[r+1][c].type.id && typeId === this.grid[r+2][c].type.id) {
                            matches.add(`${r},${c}`);
                            matches.add(`${r+1},${c}`);
                            matches.add(`${r+2},${c}`);
                        }
                    }
                }
                
                return Array.from(matches).map(s => {
                    const [r, c] = s.split(',').map(Number);
                    return { r, c };
                });
            }

            async processMatches() {
                this.isProcessing = true;
                let matches = this.findMatches();
                
                while (matches.length > 0) {
                    this.combo++;
                    if (this.combo > 1) this.showCombo(matches[0]);
                    this.playSound('match', this.combo);
                    
                    let specialToCreate = null;
                    if (matches.length === 4) specialToCreate = 'rocket';
                    else if (matches.length >= 5) specialToCreate = 'bomb';

                    const spawnPos = matches[0];
                    const matchColor = this.grid[spawnPos.r][spawnPos.c].type;

                    let allMatched = [...matches];
                    let i = 0;
                    while (i < allMatched.length) {
                        const {r, c} = allMatched[i];
                        const gem = this.grid[r][c];
                        if (gem && gem.special) {
                            const extra = this.triggerSpecialEffect(r, c, gem.special);
                            extra.forEach(ex => {
                                if (!allMatched.find(m => m.r === ex.r && m.c === ex.c)) {
                                    allMatched.push(ex);
                                }
                            });
                        }
                        i++;
                    }

                    const matchScore = (allMatched.length * 10) * (allMatched.length - 2) * this.combo;
                    this.score += matchScore;
                    this.showScore(spawnPos, matchScore);

                    for (const { r, c } of allMatched) {
                        const gem = this.grid[r][c];
                        if (gem && gem.el) {
                            this.createExplosion(gem.el, gem.type.color);
                            gem.el.style.transform = 'scale(0)';
                            setTimeout(() => gem.el.remove(), 200);
                            this.grid[r][c] = null;
                        }
                    }

                    if (specialToCreate) {
                        await new Promise(r => setTimeout(r, 200));
                        this.createSpecialGem(spawnPos.r, spawnPos.c, matchColor, specialToCreate);
                    }
                    
                    this.updateUI();
                    await new Promise(r => setTimeout(r, 300));
                    await this.dropGems();
                    matches = this.findMatches();
                }
                this.isProcessing = false;
            }

            triggerSpecialEffect(r, c, type) {
                const extra = [];
                if (type === 'rocket') {
                    for (let i = 0; i < this.gridSize; i++) extra.push({ r, c: i });
                } else if (type === 'bomb') {
                    for (let i = r-1; i <= r+1; i++) {
                        for (let j = c-1; j <= c+1; j++) {
                            if (i >= 0 && i < this.gridSize && j >= 0 && j < this.gridSize) {
                                extra.push({ r: i, c: j });
                            }
                        }
                    }
                }
                return extra;
            }

            createSpecialGem(r, c, type, special) {
                const gemEl = this.createGemElement(r, c, type);
                gemEl.classList.add(`special-${special}`);
                gemEl.innerHTML += special === 'bomb' ? '💣' : '🚀';
                this.grid[r][c] = { type, el: gemEl, special };
                this.gridEl.appendChild(gemEl);
            }

            async dropGems() {
                // Column by column
                for (let c = 0; c < this.gridSize; c++) {
                    let emptySlots = 0;
                    for (let r = this.gridSize - 1; r >= 0; r--) {
                        if (this.grid[r][c] === null) {
                            emptySlots++;
                        } else if (emptySlots > 0) {
                            const gem = this.grid[r][c];
                            this.grid[r + emptySlots][c] = gem;
                            this.grid[r][c] = null;
                            this.setGemPosition(gem.el, r + emptySlots, c);
                            gem.el.dataset.r = r + emptySlots;
                        }
                    }
                    
                    // Fill new gems
                    for (let r = 0; r < emptySlots; r++) {
                        const type = GEM_TYPES[Math.floor(Math.random() * GEM_TYPES.length)];
                        const gem = this.createGemElement(-1 - (emptySlots - r), c, type);
                        this.gridEl.appendChild(gem);
                        
                        // Animate to position
                        const finalR = r;
                        setTimeout(() => {
                            this.setGemPosition(gem, finalR, c);
                            gem.dataset.r = finalR;
                        }, 50);
                        
                        this.grid[r][c] = { type, el: gem };
                    }
                }
                await new Promise(r => setTimeout(r, 400));
            }

            updateUI() {
                this.scoreEl.textContent = this.score;
                this.movesEl.textContent = this.moves;
                this.levelEl.textContent = `Level ${this.level}`;
                this.targetEl.textContent = `Goal: ${this.targetScore}`;
                
                if (this.score > this.stats.bestScore) {
                    this.stats.bestScore = this.score;
                    this.bestEl.textContent = this.score;
                    this.saveStats();
                }
            }

            saveStats() {
                localStorage.setItem('match3_stats', JSON.stringify(this.stats));
            }

            checkGameState() {
                if (this.score >= this.targetScore) {
                    this.stopTimer();
                    this.level++;
                    this.showModal('关卡完成!', `恭喜进入第 ${this.level} 关!`, '下一关');
                } else if ((this.moves <= 0 || this.timeLeft <= 0) && !this.isProcessing) {
                    this.stopTimer();
                    this.stats.gamesPlayed++;
                    this.stats.totalScore += this.score;
                    this.saveStats();
                    this.showModal('游戏结束', `你的最终分数是: ${this.score}`, '重试');
                }
            }

            startTimer() {
                this.stopTimer();
                this.updateTimerDisplay();
                this.timerInterval = setInterval(() => {
                    this.timeLeft--;
                    this.updateTimerDisplay();
                    if (this.timeLeft <= 0) {
                        this.checkGameState();
                    }
                }, 1000);
            }

            stopTimer() {
                if (this.timerInterval) clearInterval(this.timerInterval);
            }

            updateTimerDisplay() {
                this.timerEl.textContent = this.timeLeft;
                if (this.timeLeft <= 10) {
                    this.timerEl.classList.add('timer-warning');
                } else {
                    this.timerEl.classList.remove('timer-warning');
                }
            }

            toggleStats(show) {
                const panel = document.getElementById('statsPanel');
                if (show) {
                    this.updateStatsUI();
                    panel.classList.add('active');
                } else {
                    panel.classList.remove('active');
                }
            }

            updateStatsUI() {
                document.getElementById('statGames').textContent = this.stats.gamesPlayed;
                document.getElementById('statBest').textContent = this.stats.bestScore;
                document.getElementById('statTotalScore').textContent = this.stats.totalScore;
            }

            useHint() {
                if (this.hintsLeft <= 0 || this.isProcessing) return;
                
                const move = this.findPossibleMove();
                if (move) {
                    this.hintsLeft--;
                    this.hintBtn.textContent = `提示 (${this.hintsLeft})`;
                    if (this.hintsLeft <= 0) this.hintBtn.disabled = true;
                    
                    this.clearHints();
                    move.a.el.classList.add('hint');
                    move.b.el.classList.add('hint');
                    
                    setTimeout(() => this.clearHints(), 3000);
                    this.playSound('select');
                } else {
                    alert('当前无解，正在刷新棋盘...');
                    this.createGrid();
                }
            }

            clearHints() {
                document.querySelectorAll('.gem.hint').forEach(el => el.classList.remove('hint'));
            }

            findPossibleMove() {
                for (let r = 0; r < this.gridSize; r++) {
                    for (let c = 0; c < this.gridSize; c++) {
                        // Check horizontal swap
                        if (c < this.gridSize - 1) {
                            if (this.testSwap(r, c, r, c + 1)) return { a: this.grid[r][c], b: this.grid[r][c+1] };
                        }
                        // Check vertical swap
                        if (r < this.gridSize - 1) {
                            if (this.testSwap(r, c, r + 1, c)) return { a: this.grid[r][c], b: this.grid[r+1][c] };
                        }
                    }
                }
                return null;
            }

            testSwap(r1, c1, r2, c2) {
                const temp = this.grid[r1][c1];
                this.grid[r1][c1] = this.grid[r2][c2];
                this.grid[r2][c2] = temp;
                
                const matches = this.findMatches();
                
                // Swap back
                this.grid[r2][c2] = this.grid[r1][c1];
                this.grid[r1][c1] = temp;
                
                return matches.length > 0;
            }

            showModal(title, msg, btnText) {
                document.getElementById('modalTitle').textContent = title;
                document.getElementById('modalMsg').textContent = msg;
                document.getElementById('modalBtn').textContent = btnText;
                document.getElementById('gameOverModal').classList.add('active');
            }

            // Audio & Visual Effects
            initAudio() {
                try {
                    this.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                } catch(e) {
                    console.log('AudioContext not supported');
                }
            }

            playSound(type, combo = 1) {
                if (!this.audioCtx) return;
                if (this.audioCtx.state === 'suspended') this.audioCtx.resume();
                
                const now = this.audioCtx.currentTime;
                const g = this.audioCtx.createGain();
                g.connect(this.audioCtx.destination);

                if (type === 'select') {
                    const osc = this.audioCtx.createOscillator();
                    osc.connect(g);
                    osc.frequency.setValueAtTime(400, now);
                    osc.frequency.exponentialRampToValueAtTime(800, now + 0.05);
                    g.gain.setValueAtTime(0.05, now);
                    g.gain.exponentialRampToValueAtTime(0.01, now + 0.05);
                    osc.start(); osc.stop(now + 0.05);
                } else if (type === 'match') {
                    const freq = 440 + (combo * 110);
                    const osc = this.audioCtx.createOscillator();
                    osc.connect(g);
                    osc.frequency.setValueAtTime(freq, now);
                    osc.frequency.exponentialRampToValueAtTime(freq * 1.5, now + 0.1);
                    g.gain.setValueAtTime(0.1, now);
                    g.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
                    osc.start(); osc.stop(now + 0.2);
                } else if (type === 'error') {
                    const osc = this.audioCtx.createOscillator();
                    osc.connect(g);
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(100, now);
                    g.gain.setValueAtTime(0.05, now);
                    g.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
                    osc.start(); osc.stop(now + 0.2);
                }
            }

            toggleMusic() {
                this.isMusicOn = !this.isMusicOn;
                this.musicToggle.textContent = this.isMusicOn ? '🔇 音乐' : '🔊 音乐';
                if (this.isMusicOn) {
                    if (this.audioCtx.state === 'suspended') this.audioCtx.resume();
                    this.bgInterval = setInterval(() => {
                        const now = this.audioCtx.currentTime;
                        const notes = [261, 329, 392, 523];
                        const note = notes[Math.floor(Math.random() * notes.length)];
                        const osc = this.audioCtx.createOscillator();
                        const g = this.audioCtx.createGain();
                        osc.connect(g); g.connect(this.audioCtx.destination);
                        osc.frequency.value = note;
                        g.gain.setValueAtTime(0.01, now);
                        g.gain.exponentialRampToValueAtTime(0.001, now + 1.5);
                        osc.start(); osc.stop(now + 2);
                    }, 2000);
                } else {
                    clearInterval(this.bgInterval);
                }
            }

            initParticles() {
                this.canvas = document.getElementById('particleCanvas');
                this.ctx = this.canvas.getContext('2d');
                this.particles = [];
                const resize = () => {
                    this.canvas.width = window.innerWidth;
                    this.canvas.height = window.innerHeight;
                };
                window.addEventListener('resize', resize);
                resize();
            }

            animate() {
                this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
                for (let i = this.particles.length - 1; i >= 0; i--) {
                    const p = this.particles[i];
                    p.x += p.vx; p.y += p.vy; p.vy += 0.2;
                    p.life -= 0.02;
                    if (p.life <= 0) this.particles.splice(i, 1);
                    else {
                        this.ctx.globalAlpha = p.life;
                        this.ctx.fillStyle = p.color;
                        this.ctx.beginPath();
                        this.ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                        this.ctx.fill();
                    }
                }
                requestAnimationFrame(() => this.animate());
            }

            createExplosion(el, color) {
                const rect = el.getBoundingClientRect();
                const x = rect.left + rect.width / 2;
                const y = rect.top + rect.height / 2;
                for (let i = 0; i < 15; i++) {
                    this.particles.push({
                        x, y, color,
                        vx: (Math.random() - 0.5) * 8,
                        vy: (Math.random() - 0.5) * 8,
                        size: Math.random() * 4 + 2,
                        life: 1.0
                    });
                }
            }

            showCombo(pos) {
                const popup = document.createElement('div');
                popup.className = 'combo-popup';
                popup.textContent = `${this.combo} COMBO!`;
                const rect = this.gridEl.getBoundingClientRect();
                const cellSize = rect.width / this.gridSize;
                popup.style.left = `${rect.left + pos.c * cellSize}px`;
                popup.style.top = `${rect.top + pos.r * cellSize - 40}px`;
                document.body.appendChild(popup);
                setTimeout(() => popup.remove(), 800);
            }

            showScore(pos, score) {
                const popup = document.createElement('div');
                popup.className = 'score-popup';
                popup.textContent = `+${score}`;
                const rect = this.gridEl.getBoundingClientRect();
                const cellSize = rect.width / this.gridSize;
                popup.style.left = `${rect.left + pos.c * cellSize + cellSize/4}px`;
                popup.style.top = `${rect.top + pos.r * cellSize}px`;
                document.body.appendChild(popup);
                setTimeout(() => popup.remove(), 600);
            }
        }

        window.onload = () => new Match3();
    </script>
