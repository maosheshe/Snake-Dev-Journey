<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数字配对 - Number Match Premium</title>
    <meta name="description" content="一款极具设计感的数字消除益智游戏。匹配相同数字或和为10的数字，挑战你的观察力！">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;600&display=swap">
    <style>
        :root {
            --bg-deep: #0f051d;
            --bg-panel: rgba(25, 10, 45, 0.8);
            --primary: #00f2ff;
            --secondary: #7000ff;
            --accent: #ff007a;
            --success: #00ff95;
            --warning: #ffdb4d;
            --text: #ffffff;
            --text-dim: #a090b0;
            --glow-blue: 0 0 15px rgba(0, 242, 255, 0.4);
            --glow-purple: 0 0 15px rgba(112, 0, 255, 0.4);
            
            /* Number Colors */
            --n1: #ff4d4d; --n2: #ff944d; --n3: #ffdb4d;
            --n4: #94ff4d; --n5: #4dff94; --n6: #4dffff;
            --n7: #4d94ff; --n8: #944dff; --n9: #db4dff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background-color: var(--bg-deep);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            overflow: hidden;
            position: relative;
            min-height: 100vh;
        }

        /* 核心布局包装器 */
        .app-wrapper {
            position: relative;
            z-index: 10;
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* 背景星空效果 */
        .stars-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            background: radial-gradient(circle at center, #1a0b2e 0%, #0f051d 100%);
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0.5;
            animation: twinkle var(--duration) infinite ease-in-out;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(1.2); }
        }

        /* 游戏容器 */
        .game-container {
            position: relative;
            width: 100%;
            max-width: 480px;
            height: 90vh;
            display: flex;
            flex-direction: column;
            gap: 15px;
            padding: 20px;
            background: var(--bg-panel);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5), inset 0 0 20px rgba(112, 0, 255, 0.1);
            flex-shrink: 0;
        }

        /* 页眉统计 */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            padding: 10px 5px;
        }

        .stats-left {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .stage-label {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.8rem;
            color: var(--text-dim);
            letter-spacing: 1px;
        }

        .stage-value {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5rem;
            color: var(--primary);
            text-shadow: var(--glow-blue);
        }

        .logo-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }

        .logo-box {
            border: 2px solid var(--primary);
            padding: 5px 15px;
            border-radius: 10px;
            text-align: center;
            box-shadow: inset 0 0 10px var(--primary), 0 0 15px var(--primary);
        }

        .logo-top {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.9rem;
            color: var(--primary);
            display: block;
            letter-spacing: 2px;
        }

        .logo-bottom {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.1rem;
            color: var(--accent);
            display: block;
            text-shadow: 0 0 10px var(--accent);
        }

        .score-box {
            background: rgba(255, 255, 255, 0.1);
            padding: 10px 20px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            text-align: center;
            min-width: 120px;
        }

        .score-label {
            font-size: 0.7rem;
            color: var(--text-dim);
            text-transform: uppercase;
        }

        .score-value {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.8rem;
            color: #ffffff;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }

        .stats-right {
            text-align: right;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .best-label {
            font-size: 0.7rem;
            color: var(--text-dim);
            text-transform: uppercase;
        }

        .best-value {
            font-family: 'Orbitron', sans-serif;
            font-size: 1rem;
            color: var(--success);
        }

        /* 游戏网格 */
        .grid-wrapper {
            flex: 1;
            overflow-y: auto;
            scrollbar-width: none; /* Firefox */
            -ms-overflow-style: none; /* IE */
            padding: 5px;
            position: relative;
        }

        .grid-wrapper::-webkit-scrollbar {
            display: none; /* Chrome */
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(9, 1fr);
            gap: 8px;
            padding: 10px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 15px;
            border: 2px solid rgba(255, 255, 255, 0.1);
        }

        .cell {
            aspect-ratio: 1;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.4rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .cell:hover {
            background: rgba(255, 255, 255, 0.08);
            transform: scale(1.05);
        }

        .cell.active {
            box-shadow: inset 0 0 5px rgba(255, 255, 255, 0.05);
        }

        .cell.selected {
            background: rgba(0, 242, 255, 0.2);
            border-color: var(--primary);
            box-shadow: 0 0 15px var(--primary);
            transform: scale(1.1);
            z-index: 2;
        }

        .cell.hinted {
            animation: hintPulse 0.5s ease-in-out infinite alternate;
            border-color: var(--warning);
            box-shadow: 0 0 20px var(--warning);
            z-index: 5;
        }

        @keyframes hintPulse {
            from { transform: scale(1.1); filter: brightness(1); }
            to { transform: scale(1.2); filter: brightness(1.5); }
        }

        /* 计时器条 */
        .timer-container {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            overflow: hidden;
            margin-top: 5px;
        }

        .timer-bar {
            height: 100%;
            width: 100%;
            background: linear-gradient(90deg, var(--primary), var(--success));
            box-shadow: 0 0 10px var(--primary);
            transition: width 0.1s linear, background 0.3s;
        }

        .timer-bar.warning {
            background: linear-gradient(90deg, var(--warning), var(--accent));
            box-shadow: 0 0 10px var(--accent);
        }

        /* 统计数据 */
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin: 20px 0;
            text-align: left;
        }

        .stat-item {
            background: rgba(255, 255, 255, 0.05);
            padding: 10px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .stat-label {
            font-size: 0.7rem;
            color: var(--text-dim);
            margin-bottom: 3px;
        }

        .stat-value {
            font-family: 'Orbitron', sans-serif;
            font-size: 1rem;
            color: var(--primary);
        }

        .cell.empty {
            opacity: 0;
            pointer-events: none;
            transform: scale(0.8);
        }

        .cell.matching {
            animation: matchPop 0.4s ease-out;
        }

        @keyframes matchPop {
            0% { transform: scale(1.1); filter: brightness(2); }
            100% { transform: scale(0); opacity: 0; }
        }

        /* 底部控制栏 */
        .controls {
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 15px 0;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .control-btn {
            position: relative;
            height: 50px;
            padding: 0 25px;
            border-radius: 25px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.9rem;
            font-weight: bold;
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .control-btn:active { transform: scale(0.95); }

        .btn-add {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: radial-gradient(circle, var(--primary) 0%, #0072ff 100%);
            border: 4px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.4);
        }

        .btn-add::before { width: 4px; height: 30px; content: ''; position: absolute; background: white; border-radius: 2px; }
        .btn-add::after { width: 30px; height: 4px; content: ''; position: absolute; background: white; border-radius: 2px; }

        .btn-hint {
            background: rgba(255, 219, 77, 0.1);
            border-color: #ffdb4d;
            color: #ffdb4d;
        }

        .btn-undo {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.3);
            color: white;
        }

        .btn-badge {
            position: absolute;
            top: -10px;
            right: -10px;
            background: var(--accent);
            color: white;
            font-size: 0.8rem;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            border: 2px solid var(--bg-panel);
        }

        /* 弹窗 */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
        }

        .modal.show {
            opacity: 1;
            visibility: visible;
        }

        .modal-content {
            background: var(--bg-panel);
            padding: 40px;
            border-radius: 24px;
            border: 1px solid var(--primary);
            text-align: center;
            max-width: 320px;
            width: 90%;
            transform: scale(0.8);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .modal.show .modal-content {
            transform: scale(1);
        }

        .modal-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 2rem;
            color: var(--primary);
            margin-bottom: 20px;
        }

        .modal-msg {
            color: var(--text-dim);
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .btn-primary {
            background: var(--primary);
            color: var(--bg-deep);
            border: none;
            padding: 12px 30px;
            border-radius: 12px;
            font-weight: bold;
            font-family: 'Orbitron', sans-serif;
            cursor: pointer;
            width: 100%;
            transition: all 0.2s;
        }

        /* 连击文字动画 */
        .combo-text {
            position: absolute;
            pointer-events: none;
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            color: #fff;
            text-shadow: 0 0 10px var(--accent), 0 0 20px var(--accent);
            font-size: 1.5rem;
            z-index: 1000;
            animation: floatUp 1s ease-out forwards;
        }

        @keyframes floatUp {
            0% { transform: translateY(0) scale(0.5); opacity: 1; }
            100% { transform: translateY(-100px) scale(1.5); opacity: 0; }
        }

        .time-reward {
            position: absolute;
            font-family: 'Orbitron', sans-serif;
            color: var(--success);
            font-size: 1rem;
            font-weight: bold;
            pointer-events: none;
            z-index: 1001;
            animation: timerFloat 0.8s ease-out forwards;
        }

        @keyframes timerFloat {
            0% { transform: translateY(0); opacity: 1; }
            100% { transform: translateY(-40px); opacity: 0; }
        }

        .btn-primary:hover {
            filter: brightness(1.2);
            box-shadow: 0 0 20px var(--primary);
        }

        /* 响应式调整 */
        @media (max-height: 700px) {
            .game-container { height: 95vh; }
            .cell { font-size: 1rem; }
            .control-btn { width: 50px; height: 50px; }
        }
    </style>
</head>
<body>
    <div class="stars-container" id="stars"></div>

    <div class="app-wrapper">
        <div class="game-container">
            <div class="header">
                <div class="score-box">
                    <div class="score-label">Score</div>
                    <div class="score-value" id="scoreDisplay">0</div>
                </div>
                
                <div class="logo-container">
                    <div class="logo-box">
                        <span class="logo-top">NUMBER</span>
                        <span class="logo-bottom">MATCH</span>
                    </div>
                    <div class="stage-label">Level <span id="levelNum">1</span></div>
                </div>

                <div class="stats-right">
                    <div class="stage-label">STAGE</div>
                    <div class="stage-value" id="stageDisplay">1</div>
                </div>
            </div>

            <div class="grid-wrapper">
                <div class="timer-container">
                    <div class="timer-bar" id="timerBar"></div>
                </div>
                <div class="grid" id="gameGrid">
                    <!-- Cells generated by JS -->
                </div>
            </div>

            <div class="controls">
                <div class="control-btn btn-undo" id="undoBtn">Undo</div>
                <div class="control-btn btn-add" id="addBtn"></div>
                <div class="control-btn btn-hint" id="hintBtn">Hint <span class="btn-badge" id="hintCount">3</span></div>
            </div>
        </div>
    </div>

    <canvas id="particleCanvas"></canvas>

    <!-- Modals -->
    <div class="modal" id="winModal">
        <div class="modal-content">
            <div class="modal-title">胜利!</div>
            <div class="stats-grid" id="winStats"></div>
            <button class="btn-primary" id="nextBtn">下一关</button>
        </div>
    </div>

    <div class="modal" id="loseModal">
        <div class="modal-content">
            <div class="modal-title">游戏结束</div>
            <p class="modal-msg" id="loseMsg">棋盘已满且无法再进行配对。</p>
            <div class="stats-grid" id="loseStats"></div>
            <button class="btn-primary" id="restartBtn">重新开始</button>
        </div>
    </div>

    <script>
        const GRID_WIDTH = 9;
        const INITIAL_ROWS = 3;
        const COLORS = {
            1: '#ff4d4d', 2: '#ff944d', 3: '#ffdb4d',
            4: '#94ff4d', 5: '#4dff94', 6: '#4dffff',
            7: '#4d94ff', 8: '#944dff', 9: '#db4dff'
        };

        // 音效管理器
        class SoundManager {
            constructor() {
                this.ctx = new (window.AudioContext || window.webkitAudioContext)();
                this.enabled = true;
            }

            play(type, combo = 1) {
                if (!this.enabled) return;
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.connect(gain);
                gain.connect(this.ctx.destination);

                const now = this.ctx.currentTime;

                switch(type) {
                    case 'select':
                        osc.type = 'sine';
                        osc.frequency.setValueAtTime(440, now);
                        osc.frequency.exponentialRampToValueAtTime(880, now + 0.1);
                        gain.gain.setValueAtTime(0.1, now);
                        gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                        osc.start(now);
                        osc.stop(now + 0.1);
                        break;
                    case 'match':
                        osc.type = 'triangle';
                        // 连击越高，音调越高
                        const freq = 523.25 * Math.pow(1.05, combo - 1);
                        osc.frequency.setValueAtTime(freq, now);
                        osc.frequency.exponentialRampToValueAtTime(freq * 2, now + 0.2);
                        gain.gain.setValueAtTime(0.2, now);
                        gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
                        osc.start(now);
                        osc.stop(now + 0.3);
                        break;
                    case 'rowClear':
                        osc.type = 'square';
                        osc.frequency.setValueAtTime(200, now);
                        osc.frequency.exponentialRampToValueAtTime(50, now + 0.5);
                        gain.gain.setValueAtTime(0.1, now);
                        gain.gain.exponentialRampToValueAtTime(0.01, now + 0.5);
                        osc.start(now);
                        osc.stop(now + 0.5);
                        break;
                    case 'error':
                        osc.type = 'sawtooth';
                        osc.frequency.setValueAtTime(150, now);
                        osc.frequency.linearRampToValueAtTime(100, now + 0.2);
                        gain.gain.setValueAtTime(0.1, now);
                        gain.gain.linearRampToValueAtTime(0.01, now + 0.2);
                        osc.start(now);
                        osc.stop(now + 0.2);
                        break;
                }
            }
        }

        // 粒子系统
        class ParticleSystem {
            constructor() {
                this.canvas = document.getElementById('particleCanvas');
                this.ctx = this.canvas.getContext('2d');
                this.particles = [];
                this.resize();
                window.addEventListener('resize', () => this.resize());
                this.animate();
            }

            resize() {
                this.canvas.width = window.innerWidth;
                this.canvas.height = window.innerHeight;
            }

            explode(x, y, color) {
                for (let i = 0; i < 15; i++) {
                    this.particles.push({
                        x, y,
                        vx: (Math.random() - 0.5) * 10,
                        vy: (Math.random() - 0.5) * 10,
                        life: 1,
                        color,
                        size: Math.random() * 4 + 2
                    });
                }
            }

            animate() {
                this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
                for (let i = this.particles.length - 1; i >= 0; i--) {
                    const p = this.particles[i];
                    p.x += p.vx;
                    p.y += p.vy;
                    p.vy += 0.2; // Gravity
                    p.life -= 0.02;
                    if (p.life <= 0) {
                        this.particles.splice(i, 1);
                        continue;
                    }
                    this.ctx.globalAlpha = p.life;
                    this.ctx.fillStyle = p.color;
                    this.ctx.shadowBlur = 10;
                    this.ctx.shadowColor = p.color;
                    this.ctx.beginPath();
                    this.ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                    this.ctx.fill();
                }
                requestAnimationFrame(() => this.animate());
            }
        }

        class NumberMatch {
            constructor() {
                this.grid = []; 
                this.history = [];
                this.score = 0;
                this.stage = 1;
                this.bestScore = parseInt(localStorage.getItem('numberMatch_best')) || 0;
                this.selectedIdx = null;
                this.isProcessing = false;
                
                this.hintsLeft = 3;
                this.addsLeft = 6;
                this.timeLimit = 120;
                this.timeLeft = 120;
                this.timerId = null;
                
                this.comboCount = 0;
                this.lastMatchTime = 0;
                this.comboWindow = 2000; // 2秒连击窗口

                this.globalStats = JSON.parse(localStorage.getItem('numberMatch_stats')) || {
                    totalMatches: 0,
                    totalRows: 0,
                    totalTime: 0,
                    gamesPlayed: 0
                };

                this.sessionStats = {
                    matches: 0,
                    rowsCleared: 0,
                    startTime: 0
                };

                this.sounds = new SoundManager();
                this.particles = new ParticleSystem();

                this.initDOM();
                this.initStars();
                this.startGame();
            }

            saveHistory() {
                this.history.push({
                    grid: JSON.parse(JSON.stringify(this.grid)),
                    score: this.score,
                    addsLeft: this.addsLeft
                });
                if (this.history.length > 20) this.history.shift();
            }

            undo() {
                if (this.history.length === 0 || this.isProcessing) {
                    this.sounds.play('error');
                    return;
                }
                const state = this.history.pop();
                this.grid = state.grid;
                this.score = state.score;
                this.addsLeft = state.addsLeft;
                this.selectedIdx = null;
                this.sounds.play('select');
                this.updateUI();
                this.render();
            }


            initDOM() {
                this.gridEl = document.getElementById('gameGrid');
                this.scoreEl = document.getElementById('scoreDisplay');
                this.stageEl = document.getElementById('stageDisplay');
                this.levelNumEl = document.getElementById('levelNum');
                this.addBtn = document.getElementById('addBtn');
                this.hintBtn = document.getElementById('hintBtn');
                this.undoBtn = document.getElementById('undoBtn');
                this.hintCountEl = document.getElementById('hintCount');

                this.addBtn.onclick = () => this.addNumbers();
                this.hintBtn.onclick = () => this.useHint();
                this.undoBtn.onclick = () => this.undo();

                document.getElementById('nextBtn').onclick = () => this.nextStage();
                document.getElementById('restartBtn').onclick = () => this.startGame();
            }

            initStars() {
                const container = document.getElementById('stars');
                for (let i = 0; i < 100; i++) {
                    const star = document.createElement('div');
                    star.className = 'star';
                    const size = Math.random() * 3;
                    star.style.width = `${size}px`;
                    star.style.height = `${size}px`;
                    star.style.left = `${Math.random() * 100}%`;
                    star.style.top = `${Math.random() * 100}%`;
                    star.style.setProperty('--duration', `${2 + Math.random() * 3}s`);
                    container.appendChild(star);
                }
            }

            startGame() {
                this.score = 0;
                this.stage = 1;
                this.hintsLeft = 3;
                this.addsLeft = 6;
                this.grid = [];
                this.history = [];
                this.selectedIdx = null;
                this.isProcessing = false;
                
                this.globalStats.gamesPlayed++;
                this.sessionStats = { matches: 0, rowsCleared: 0, startTime: Date.now() };
                
                this.hideModals();
                this.resetTimer();
                this.updateUI();
                this.generateInitialGrid();
                this.render();
                this.startTimer();
            }

            nextStage() {
                this.stage++;
                this.hintsLeft = Math.min(this.hintsLeft + 1, 5);
                this.addsLeft = Math.min(this.addsLeft + 2, 9);
                this.grid = [];
                this.selectedIdx = null;
                
                this.hideModals();
                this.resetTimer();
                this.updateUI();
                this.generateInitialGrid();
                this.render();
                this.startTimer();
            }

            resetTimer() {
                clearInterval(this.timerId);
                // 随着关卡增加，时间略微增加但由于行数变多，压力变大
                this.timeLimit = 120 + (this.stage - 1) * 30;
                this.timeLeft = this.timeLimit;
            }

            startTimer() {
                this.timerId = setInterval(() => {
                    this.timeLeft--;
                    this.updateTimerUI();
                    if (this.timeLeft <= 0) {
                        clearInterval(this.timerId);
                        this.handleTimeOut();
                    }
                }, 1000);
            }

            updateTimerUI() {
                const bar = document.getElementById('timerBar');
                const percent = (this.timeLeft / this.timeLimit) * 100;
                bar.style.width = `${percent}%`;
                if (percent < 25) bar.classList.add('warning');
                else bar.classList.remove('warning');
            }

            handleTimeOut() {
                this.sounds.play('error');
                document.getElementById('loseMsg').textContent = "时间到了！";
                this.showLoseModal();
            }

            generateInitialGrid() {
                // 难度设定：初始行数随关卡增加
                const initialRows = Math.min(3 + Math.floor((this.stage - 1) / 2), 12);
                const count = GRID_WIDTH * initialRows;
                for (let i = 0; i < count; i++) {
                    this.grid.push({
                        value: Math.floor(Math.random() * 9) + 1,
                        status: 'active',
                        id: Math.random()
                    });
                }
            }

            updateUI() {
                this.scoreEl.textContent = this.score.toLocaleString();
                this.stageEl.textContent = this.stage;
                this.levelNumEl.textContent = this.stage * 14 - 10;
                this.hintCountEl.textContent = this.hintsLeft;
                
                // 更新加号按钮状态
                if (this.addsLeft <= 0) {
                    this.addBtn.style.filter = 'grayscale(1) opacity(0.5)';
                    this.addBtn.style.cursor = 'not-allowed';
                    this.addBtn.style.boxShadow = 'none';
                } else {
                    this.addBtn.style.filter = 'none';
                    this.addBtn.style.cursor = 'pointer';
                    this.addBtn.style.boxShadow = '0 0 20px rgba(0, 242, 255, 0.4)';
                }

                if (this.score > this.bestScore) {
                    this.bestScore = this.score;
                    localStorage.setItem('numberMatch_best', this.bestScore);
                }
            }

            render() {
                this.gridEl.innerHTML = '';
                this.grid.forEach((cell, index) => {
                    const el = document.createElement('div');
                    el.className = `cell ${cell.status}`;
                    if (cell.status === 'active') {
                        el.textContent = cell.value;
                        el.style.color = COLORS[cell.value];
                        el.style.boxShadow = `inset 0 0 10px ${COLORS[cell.value]}22`;
                        el.onclick = () => this.handleCellClick(index);
                    }
                    if (this.selectedIdx === index) el.classList.add('selected');
                    this.gridEl.appendChild(el);
                });
            }

            handleCellClick(index) {
                if (this.isProcessing) return;
                
                if (this.selectedIdx === null) {
                    this.selectedIdx = index;
                    this.sounds.play('select');
                    this.render();
                    return;
                }

                if (this.selectedIdx === index) {
                    this.selectedIdx = null;
                    this.render();
                    return;
                }

                if (this.canMatch(this.selectedIdx, index)) {
                    this.eliminate(this.selectedIdx, index);
                } else {
                    this.selectedIdx = index; 
                    this.sounds.play('select');
                    this.render();
                }
            }

            canMatch(idx1, idx2) {
                const c1 = this.grid[idx1];
                const c2 = this.grid[idx2];
                const valMatch = (c1.value === c2.value) || (c1.value + c2.value === 10);
                if (!valMatch) return false;
                
                // 1. 直线连接 (水平、垂直、对角线)
                if (this.hasClearPath(idx1, idx2)) return true;

                // 2. 阅读顺序连接 (中间没有其他数字阻碍)
                return this.isConsecutiveInSequence(idx1, idx2);
            }

            isConsecutiveInSequence(idx1, idx2) {
                const start = Math.min(idx1, idx2);
                const end = Math.max(idx1, idx2);
                
                for (let i = start + 1; i < end; i++) {
                    if (this.grid[i].status === 'active') return false;
                }
                return true;
            }

            hasClearPath(idx1, idx2) {
                const r1 = Math.floor(idx1 / GRID_WIDTH);
                const c1 = idx1 % GRID_WIDTH;
                const r2 = Math.floor(idx2 / GRID_WIDTH);
                const c2 = idx2 % GRID_WIDTH;

                const dr = r2 - r1;
                const dc = c2 - c1;

                const isH = dr === 0;
                const isV = dc === 0;
                const isD = Math.abs(dr) === Math.abs(dc);

                if (!isH && !isV && !isD) return false;

                const stepR = dr === 0 ? 0 : dr / Math.abs(dr);
                const stepC = dc === 0 ? 0 : dc / Math.abs(dc);

                let currR = r1 + stepR;
                let currC = c1 + stepC;

                while (currR !== r2 || currC !== c2) {
                    const currIdx = currR * GRID_WIDTH + currC;
                    if (this.grid[currIdx].status === 'active') return false;
                    currR += stepR;
                    currC += stepC;
                }
                return true;
            }

            async eliminate(idx1, idx2) {
                this.isProcessing = true;
                this.saveHistory();
                const cells = this.gridEl.children;
                
                const rect1 = cells[idx1].getBoundingClientRect();
                const rect2 = cells[idx2].getBoundingClientRect();

                // 计算连击
                const now = Date.now();
                if (now - this.lastMatchTime < this.comboWindow) {
                    this.comboCount++;
                } else {
                    this.comboCount = 1;
                }
                this.lastMatchTime = now;

                this.particles.explode(rect1.left + rect1.width/2, rect1.top + rect1.height/2, COLORS[this.grid[idx1].value]);
                this.particles.explode(rect2.left + rect2.width/2, rect2.top + rect2.height/2, COLORS[this.grid[idx2].value]);

                cells[idx1].classList.add('matching');
                cells[idx2].classList.add('matching');
                this.sounds.play('match', this.comboCount);

                // 连击特效
                if (this.comboCount > 1) {
                    this.showFloatingText(`Combo x${this.comboCount}`, rect1.left, rect1.top);
                    
                    // 连击时间奖励
                    this.timeLeft = Math.min(this.timeLeft + 1, this.timeLimit);
                    this.showTimeRewardText("+1s");
                    this.updateTimerUI();
                }

                await new Promise(r => setTimeout(r, 400));

                this.grid[idx1].status = 'empty';
                this.grid[idx2].status = 'empty';
                this.selectedIdx = null;

                const baseScore = 10;
                this.score += baseScore * this.comboCount;
                this.sessionStats.matches++;
                this.globalStats.totalMatches++;
                
                const cleared = this.checkRows();
                if (cleared) this.sounds.play('rowClear');
                
                this.updateUI();
                this.render();
                this.isProcessing = false;

                this.checkGameState();
            }

            showFloatingText(text, x, y) {
                const el = document.createElement('div');
                el.className = 'combo-text';
                el.textContent = text;
                el.style.left = `${x}px`;
                el.style.top = `${y}px`;
                document.body.appendChild(el);
                setTimeout(() => el.remove(), 1000);
            }

            showTimeRewardText(text) {
                const bar = document.getElementById('timerBar');
                const rect = bar.getBoundingClientRect();
                const el = document.createElement('div');
                el.className = 'time-reward';
                el.textContent = text;
                el.style.left = `${rect.right - 40}px`;
                el.style.top = `${rect.top - 20}px`;
                document.body.appendChild(el);
                setTimeout(() => el.remove(), 800);
            }

            checkRows() {
                let rowsToRemove = [];
                for (let r = 0; r < Math.ceil(this.grid.length / GRID_WIDTH); r++) {
                    let isEmpty = true;
                    for (let c = 0; c < GRID_WIDTH; c++) {
                        const idx = r * GRID_WIDTH + c;
                        if (idx < this.grid.length && this.grid[idx].status === 'active') {
                            isEmpty = false;
                            break;
                        }
                    }
                    if (isEmpty && (r * GRID_WIDTH < this.grid.length)) {
                        rowsToRemove.push(r);
                    }
                }

                if (rowsToRemove.length > 0) {
                    for (let i = rowsToRemove.length - 1; i >= 0; i--) {
                        const r = rowsToRemove[i];
                        this.grid.splice(r * GRID_WIDTH, GRID_WIDTH);
                        this.score += 50;
                        this.sessionStats.rowsCleared++;
                        this.globalStats.totalRows++;
                    }
                    return true;
                }
                return false;
            }

            addNumbers() {
                if (this.addsLeft <= 0 || this.isProcessing) return;
                this.saveHistory();
                
                const activeValues = this.grid
                    .filter(c => c.status === 'active')
                    .map(c => c.value);

                if (activeValues.length === 0) return;

                this.addsLeft--;
                this.sounds.play('select');
                activeValues.forEach(val => {
                    this.grid.push({
                        value: val,
                        status: 'active',
                        id: Math.random()
                    });
                });

                this.updateUI();
                this.render();
                this.checkGameState();
            }

            useHint() {
                if (this.hintsLeft <= 0 || this.isProcessing) return;
                
                const pair = this.findPair();
                if (pair) {
                    this.hintsLeft--;
                    this.updateUI();
                    this.sounds.play('select');
                    
                    const cells = this.gridEl.children;
                    cells[pair[0]].classList.add('hinted');
                    cells[pair[1]].classList.add('hinted');
                    
                    setTimeout(() => {
                        if (cells[pair[0]]) cells[pair[0]].classList.remove('hinted');
                        if (cells[pair[1]]) cells[pair[1]].classList.remove('hinted');
                    }, 2000);
                } else {
                    this.sounds.play('error');
                }
            }

            findPair() {
                for (let i = 0; i < this.grid.length; i++) {
                    if (this.grid[i].status !== 'active') continue;
                    for (let j = i + 1; j < this.grid.length; j++) {
                        if (this.grid[j].status !== 'active') continue;
                        if (this.canMatch(i, j)) return [i, j];
                    }
                }
                return null;
            }

            checkGameState() {
                const activeCount = this.grid.filter(c => c.status === 'active').length;
                if (activeCount === 0) {
                    clearInterval(this.timerId);
                    this.sounds.play('match');
                    this.showWinModal();
                    return;
                }

                if (this.addsLeft === 0 && !this.findPair()) {
                    clearInterval(this.timerId);
                    this.sounds.play('error');
                    document.getElementById('loseMsg').textContent = "棋盘已满且无法再进行配对。";
                    this.showLoseModal();
                }
            }

            showWinModal() {
                const statsEl = document.getElementById('winStats');
                this.saveGlobalStats();
                statsEl.innerHTML = this.getStatsHTML();
                document.getElementById('winModal').classList.add('show');
            }

            showLoseModal() {
                const statsEl = document.getElementById('loseStats');
                this.saveGlobalStats();
                statsEl.innerHTML = this.getStatsHTML();
                document.getElementById('loseModal').classList.add('show');
            }

            saveGlobalStats() {
                const duration = Math.floor((Date.now() - this.sessionStats.startTime) / 1000);
                this.globalStats.totalTime += duration;
                localStorage.setItem('numberMatch_stats', JSON.stringify(this.globalStats));
            }

            getStatsHTML() {
                return `
                    <div class="stat-item">
                        <div class="stat-label">本次得分</div>
                        <div class="stat-value">${this.score}</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">配对总数</div>
                        <div class="stat-value">${this.globalStats.totalMatches}</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">清空行数</div>
                        <div class="stat-value">${this.globalStats.totalRows}</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">累计局数</div>
                        <div class="stat-value">${this.globalStats.gamesPlayed}</div>
                    </div>
                `;
            }

            hideModals() {
                document.getElementById('winModal').classList.remove('show');
                document.getElementById('loseModal').classList.remove('show');
            }
        }

        window.onload = () => new NumberMatch();
    </script>
</body>
</html>
